<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open-Source Vacuum — Simulation Chamber v8.0</title>
<meta name="description" content="Interactive topological simulations of the UHF superfluid vacuum. Mermin-Tesla singularity, trefoil reconnection, LISA acoustic echo.">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#06060e;--panel:#0a0a18;--border:#1a1a3a;--border-hi:#2a2a5a;
  --neon:#06ffa5;--neon-dim:rgba(6,255,165,0.15);--neon-glow:rgba(6,255,165,0.4);
  --cyan:#38bdf8;--cyan-dim:rgba(56,189,248,0.15);
  --magenta:#e879f9;--magenta-dim:rgba(232,121,249,0.15);
  --text:#c8ccd4;--text-dim:#5a5e6a;--text-bright:#f0f2f5;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--void);color:var(--text);font-family:var(--sans)}

/* ═══ LAYOUT ═══ */
.chamber{display:flex;flex-direction:column;height:100vh;width:100vw}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  height:48px;padding:0 20px;
  background:var(--panel);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:100;
}
.topbar-title{font:500 13px var(--mono);color:var(--text-dim);letter-spacing:0.08em;text-transform:uppercase}
.topbar-title span{color:var(--neon)}
.topbar-back{font:400 12px var(--mono);color:var(--text-dim);text-decoration:none;
  padding:4px 12px;border:1px solid var(--border);border-radius:6px;transition:all .2s}
.topbar-back:hover{color:var(--neon);border-color:var(--neon)}

/* ═══ RADIO BAR ═══ */
.radiobar{
  display:flex;align-items:stretch;height:56px;
  background:var(--panel);border-bottom:1px solid var(--border);
  flex-shrink:0;position:relative;z-index:90;
}
.radio-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:10px;
  background:transparent;border:none;border-bottom:2px solid transparent;
  color:var(--text-dim);font:500 12px var(--mono);letter-spacing:0.04em;
  cursor:pointer;transition:all .25s;position:relative;padding:0 12px;
  text-transform:uppercase;
}
.radio-btn:hover{color:var(--text);background:rgba(255,255,255,0.02)}
.radio-btn.active{color:var(--neon);border-bottom-color:var(--neon);background:var(--neon-dim)}
.radio-btn[data-sim="trefoil"].active{color:var(--cyan);border-bottom-color:var(--cyan);background:var(--cyan-dim)}
.radio-btn[data-sim="lisa"].active{color:var(--magenta);border-bottom-color:var(--magenta);background:var(--magenta-dim)}
.radio-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid currentColor;flex-shrink:0;transition:all .25s}
.radio-btn.active .radio-dot{background:currentColor;box-shadow:0 0 8px currentColor}
.radio-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ═══ VIEWPORT ═══ */
.viewport{flex:1;position:relative;overflow:hidden;background:var(--void)}
.viewport canvas,.viewport .sim-container{position:absolute;inset:0;width:100%!important;height:100%!important}

/* ═══ FADE OVERLAY ═══ */
.fade-overlay{
  position:absolute;inset:0;background:var(--void);z-index:50;
  opacity:0;pointer-events:none;transition:opacity .35s ease;
}
.fade-overlay.active{opacity:1;pointer-events:all}

/* ═══ HUD ═══ */
.hud{
  display:flex;gap:10px;padding:10px 20px;
  background:var(--panel);border-top:1px solid var(--border);
  flex-shrink:0;overflow-x:auto;align-items:stretch;
}
.hud-card{
  background:rgba(20,20,40,0.6);
  border:1px solid var(--border);border-radius:8px;padding:10px 14px;
  min-width:160px;flex-shrink:0;
}
.hud-label{font:500 9px var(--mono);color:var(--text-dim);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px}
.hud-value{font:600 18px var(--mono);color:var(--neon);line-height:1.2}
.hud-value.cyan{color:var(--cyan)}
.hud-value.magenta{color:var(--magenta)}
.hud-sub{font:400 10px var(--mono);color:var(--text-dim);margin-top:2px}

/* ═══ CONTROLS BAR ═══ */
.controls{
  display:none;align-items:center;gap:16px;padding:0 20px;height:40px;
  background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;
}
.controls.visible{display:flex}
.ctrl-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);
  font:400 11px var(--mono);padding:4px 12px;border-radius:4px;cursor:pointer;transition:all .2s}
.ctrl-btn:hover,.ctrl-btn.active{color:var(--cyan);border-color:var(--cyan)}
.ctrl-label{font:400 10px var(--mono);color:var(--text-dim);white-space:nowrap}
.ctrl-slider{-webkit-appearance:none;appearance:none;height:3px;background:var(--border);
  border-radius:2px;outline:none;flex:1;max-width:250px}
.ctrl-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:var(--cyan);cursor:pointer}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .radio-btn{font-size:10px;gap:6px;padding:0 8px}
  .radio-label{font-size:9px}
  .hud{padding:8px 12px;gap:6px}
  .hud-card{padding:6px 10px;min-width:120px}
  .hud-value{font-size:14px}
  .topbar{padding:0 12px}
}
@media(max-width:480px){
  .radiobar{height:48px}
  .radio-label{display:none}
}

/* ═══ SLIDER VARIANTS ═══ */
.ctrl-slider.neon::-webkit-slider-thumb{background:var(--neon)}
.ctrl-slider.magenta::-webkit-slider-thumb{background:var(--magenta)}
.ctrl-value{font:600 12px var(--mono);color:var(--text-bright);min-width:50px}
.ctrl-sep{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0}
</style>
</head>
<body>

<div class="chamber">
  <!-- ═══ TOP BAR ═══ -->
  <div class="topbar">
    <div class="topbar-title"><span>UHF</span> Simulation Chamber <span>v8.0</span></div>
    <a href="index.html" class="topbar-back">← Main</a>
  </div>

  <!-- ═══ RADIO BAR ═══ -->
  <div class="radiobar" id="radiobar">
    <button class="radio-btn active" data-sim="mermin" onclick="switchSim('mermin')">
      <span class="radio-dot"></span>
      <span class="radio-label">The Mermin-Tesla Singularity</span>
    </button>
    <button class="radio-btn" data-sim="trefoil" onclick="switchSim('trefoil')">
      <span class="radio-dot"></span>
      <span class="radio-label">The Trefoil Reconnection</span>
    </button>
    <button class="radio-btn" data-sim="lisa" onclick="switchSim('lisa')">
      <span class="radio-dot"></span>
      <span class="radio-label">The LISA Acoustic Echo</span>
    </button>
  </div>

  <!-- ═══ VIEWPORT ═══ -->
  <div class="viewport" id="viewport">
    <div class="fade-overlay" id="fade"></div>

    <!-- Mermin container (2D canvas) -->
    <canvas id="mermin-canvas" class="sim-container" style="display:block"></canvas>

    <!-- Trefoil container (Three.js) -->
    <div id="trefoil-container" class="sim-container" style="display:none"></div>

    <!-- LISA container (2D canvas) -->
    <canvas id="lisa-canvas" class="sim-container" style="display:none"></canvas>
  </div>

  <!-- Controls bar (play/pause, sliders) -->
  <div class="controls" id="controls"></div>

  <!-- HUD (dedicated bottom strip) -->
  <div class="hud" id="hud"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CHAMBER CONTROLLER — Slider-Driven Simulations
// ═══════════════════════════════════════════════════════════════════
(function(){
'use strict';

var activeSim = 'mermin';
var activeWorker = null;
var threeScene = null, threeRenderer = null, threeCamera = null, threeRAF = null;
var merminRAF = null, lisaRAF = null;

// ═══ MEMORY SANITIZATION ═══
function purge() {
    if (activeWorker) { activeWorker.terminate(); activeWorker = null; }
    if (merminRAF) { cancelAnimationFrame(merminRAF); merminRAF = null; }
    if (lisaRAF) { cancelAnimationFrame(lisaRAF); lisaRAF = null; }
    if (threeRAF) { cancelAnimationFrame(threeRAF); threeRAF = null; }
    if (threeScene) {
        threeScene.traverse(function(obj) {
            if (obj.geometry) obj.geometry.dispose();
            if (obj.material) {
                if (Array.isArray(obj.material)) obj.material.forEach(function(m){m.dispose()});
                else obj.material.dispose();
            }
        });
        threeScene = null;
    }
    if (threeRenderer) {
        threeRenderer.dispose();
        threeRenderer.forceContextLoss();
        var el = threeRenderer.domElement;
        if (el && el.parentNode) el.parentNode.removeChild(el);
        threeRenderer = null;
    }
    threeCamera = null;
    document.getElementById('hud').innerHTML = '';
    document.getElementById('controls').className = 'controls';
    document.getElementById('controls').innerHTML = '';
}

function fadeTransition(cb) {
    var overlay = document.getElementById('fade');
    overlay.classList.add('active');
    setTimeout(function(){ cb(); setTimeout(function(){ overlay.classList.remove('active'); }, 80); }, 350);
}

window.switchSim = function(sim) {
    if (sim === activeSim) return;
    fadeTransition(function(){
        purge();
        document.getElementById('mermin-canvas').style.display = 'none';
        document.getElementById('trefoil-container').style.display = 'none';
        document.getElementById('lisa-canvas').style.display = 'none';
        document.querySelectorAll('.radio-btn').forEach(function(b){
            b.classList.toggle('active', b.dataset.sim === sim);
        });
        activeSim = sim;
        if (sim === 'mermin') initMermin();
        else if (sim === 'trefoil') initTrefoil();
        else if (sim === 'lisa') initLisa();
    });
};

// ═══ Helpers ═══
function sup(n) {
    var s = {'0':'\u2070','1':'\u00B9','2':'\u00B2','3':'\u00B3','4':'\u2074','5':'\u2075','6':'\u2076','7':'\u2077'};
    return String(n).split('').map(function(c){return s[c]||c}).join('');
}

// ═══════════════════════════════════════════════════════════════════
// SIM 1: MERMIN–KLYSHKO  —  N slider (2–8)
// ═══════════════════════════════════════════════════════════════════
function initMermin() {
    var canvas = document.getElementById('mermin-canvas');
    canvas.style.display = 'block';
    var ctx = canvas.getContext('2d');

    // All values computed inline (trivial)
    var results = [];
    for (var N = 2; N <= 8; N++) {
        results.push({ N: N, quantum: Math.pow(2, N - 1), classical: 2, ratio: Math.pow(2, N - 1) / 2 });
    }

    var selectedN = 7;
    var t = 0;

    // ── Controls: N slider ──
    var ctrl = document.getElementById('controls');
    ctrl.className = 'controls visible';
    ctrl.innerHTML =
        '<span class="ctrl-label">N =</span>' +
        '<input type="range" class="ctrl-slider neon" min="2" max="8" step="1" value="7" id="mermin-n-slider">' +
        '<span class="ctrl-value" id="mermin-n-val" style="color:var(--neon)">7</span>';
    document.getElementById('mermin-n-slider').oninput = function() {
        selectedN = parseInt(this.value);
        document.getElementById('mermin-n-val').textContent = selectedN;
        updateHUD();
    };

    function updateHUD() {
        var qMax = Math.pow(2, selectedN - 1);
        var ratio = qMax / 2;
        document.getElementById('hud').innerHTML =
            '<div class="hud-card"><div class="hud-label">N=' + selectedN + ' Quantum Max</div><div class="hud-value">' + qMax + '.0</div><div class="hud-sub">= 2' + sup(selectedN-1) + '</div></div>' +
            '<div class="hud-card"><div class="hud-label">Violation Ratio</div><div class="hud-value">' + ratio + '\u00D7</div><div class="hud-sub">above LHV bound</div></div>' +
            '<div class="hud-card"><div class="hud-label">Recursion</div><div class="hud-value">|M\u2099| = 2|M\u2099\u208B\u2081|</div><div class="hud-sub">doubling per vortex</div></div>' +
            '<div class="hud-card"><div class="hud-label">LHV Pairwise Model</div><div class="hud-value" style="color:#f472b6">' + (selectedN >= 3 ? 'RULED OUT' : 'BORDERLINE') + '</div><div class="hud-sub">' + (selectedN >= 3 ? 'by N\u22653 scaling' : 'N=2 Tsirelson') + '</div></div>';
    }
    updateHUD();

    function draw() {
        var W = canvas.parentElement.clientWidth;
        var H = canvas.parentElement.clientHeight;
        if (canvas.width !== W * 2 || canvas.height !== H * 2) {
            canvas.width = W * 2; canvas.height = H * 2;
            canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        }
        ctx.setTransform(2, 0, 0, 2, 0, 0);
        ctx.clearRect(0, 0, W, H);
        t += 0.016;

        var padL = 100, padR = 60, padT = 80, padB = 80;
        var chartW = W - padL - padR;
        var chartH = H - padT - padB;
        var yMax = 160;

        function toX(N) { return padL + ((N - 2) / 6) * chartW; }
        function toY(v) { return padT + chartH - (v / yMax) * chartH; }

        // Grid
        ctx.strokeStyle = 'rgba(26,26,58,0.4)'; ctx.lineWidth = 0.5;
        for (var x = 80; x < W; x += 80) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
        for (var y = 60; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

        // Axes
        ctx.strokeStyle = 'rgba(200,200,220,0.15)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(padL, padT); ctx.lineTo(padL, padT + chartH); ctx.lineTo(padL + chartW, padT + chartH); ctx.stroke();

        // X labels
        ctx.fillStyle = 'rgba(200,200,220,0.5)'; ctx.font = '11px JetBrains Mono'; ctx.textAlign = 'center';
        for (var n = 2; n <= 8; n++) {
            ctx.fillStyle = n === selectedN ? '#06ffa5' : 'rgba(200,200,220,0.5)';
            ctx.fillText('N=' + n, toX(n), padT + chartH + 20);
        }

        // Y labels
        ctx.textAlign = 'right';
        for (var v = 0; v <= yMax; v += 32) {
            ctx.fillStyle = 'rgba(200,200,220,0.3)'; ctx.fillText(v.toFixed(0), padL - 10, toY(v) + 4);
            ctx.strokeStyle = 'rgba(200,200,220,0.05)';
            ctx.beginPath(); ctx.moveTo(padL, toY(v)); ctx.lineTo(padL + chartW, toY(v)); ctx.stroke();
        }

        // LHV bound
        ctx.strokeStyle = 'rgba(244,114,182,0.4)'; ctx.lineWidth = 1; ctx.setLineDash([6,4]);
        ctx.beginPath(); ctx.moveTo(padL, toY(2)); ctx.lineTo(padL + chartW, toY(2)); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(244,114,182,0.6)'; ctx.textAlign = 'left'; ctx.font = '10px JetBrains Mono';
        ctx.fillText('LHV BOUND = 2', padL + 8, toY(2) - 6);

        // Exponential curve
        ctx.strokeStyle = 'rgba(6,255,165,0.5)'; ctx.lineWidth = 2; ctx.beginPath();
        for (var i = 0; i <= 120; i++) {
            var N_ = 2 + (i / 120) * 6;
            var val = Math.pow(2, N_ - 1);
            var px = toX(N_), py = toY(val);
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.strokeStyle = 'rgba(6,255,165,0.12)'; ctx.lineWidth = 8; ctx.stroke();

        // Data points
        for (var j = 0; j < results.length; j++) {
            var r = results[j];
            var px = toX(r.N), py = toY(r.quantum);
            var isSel = r.N === selectedN;

            if (isSel) {
                ctx.beginPath(); ctx.arc(px, py, 22 + Math.sin(t * 3) * 3, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(6,255,165,0.15)'; ctx.fill();
            }
            ctx.beginPath(); ctx.arc(px, py, isSel ? 7 : 4, 0, Math.PI * 2);
            ctx.fillStyle = isSel ? '#06ffa5' : 'rgba(6,255,165,0.5)'; ctx.fill();
            ctx.strokeStyle = isSel ? '#fff' : 'rgba(255,255,255,0.2)';
            ctx.lineWidth = isSel ? 2 : 1; ctx.stroke();

            ctx.textAlign = 'center';
            if (isSel) {
                ctx.fillStyle = '#06ffa5'; ctx.font = 'bold 13px JetBrains Mono';
                ctx.fillText(r.quantum.toFixed(1), px, py - 18);
                ctx.fillStyle = 'rgba(200,200,220,0.5)'; ctx.font = '9px JetBrains Mono';
                ctx.fillText(selectedN >= 3 ? 'LHV PAIRWISE: RULED OUT' : 'TSIRELSON BOUND', px, py - 7);
            } else {
                ctx.fillStyle = 'rgba(200,200,220,0.4)'; ctx.font = '10px JetBrains Mono';
                ctx.fillText(r.quantum.toFixed(0), px, py - 10);
            }
        }

        // Title
        ctx.fillStyle = '#06ffa5'; ctx.font = 'bold 16px JetBrains Mono'; ctx.textAlign = 'center';
        ctx.fillText('MERMIN\u2013KLYSHKO SCALING: |\u27E8M_N\u27E9| = 2^{N\u22121}', W / 2, 35);
        ctx.fillStyle = 'rgba(200,200,220,0.4)'; ctx.font = '11px JetBrains Mono';
        ctx.fillText('Each vortex loop doubles the operator: |M_N| = 2 \u00D7 |M_{N\u22121}|', W / 2, 55);

        // Axis titles
        ctx.fillStyle = 'rgba(200,200,220,0.4)'; ctx.font = '11px JetBrains Mono'; ctx.textAlign = 'center';
        ctx.fillText('N (number of entangled vortex loops)', W / 2, padT + chartH + 45);
        ctx.save(); ctx.translate(20, H / 2); ctx.rotate(-Math.PI / 2);
        ctx.fillText('|\u27E8M_N\u27E9| (quantum maximum)', 0, 0); ctx.restore();

        merminRAF = requestAnimationFrame(draw);
    }
    draw();
}


// ═══════════════════════════════════════════════════════════════════
// SIM 2: TREFOIL RECONNECTION  —  Dissipation slider
// ═══════════════════════════════════════════════════════════════════
function initTrefoil() {
    var container = document.getElementById('trefoil-container');
    container.style.display = 'block';
    container.innerHTML = '';
    var W = container.clientWidth, H = container.clientHeight;

    threeScene = new THREE.Scene();
    threeCamera = new THREE.PerspectiveCamera(55, W / H, 0.1, 100);
    threeCamera.position.set(0, 3, 8);
    threeCamera.lookAt(0, 0, 0);

    threeRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    threeRenderer.setSize(W, H);
    threeRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    threeRenderer.setClearColor(0x06060e, 1);
    container.appendChild(threeRenderer.domElement);

    threeScene.add(new THREE.AmbientLight(0x1a1a4e, 0.4));
    var pl1 = new THREE.PointLight(0x38bdf8, 2, 20); pl1.position.set(3, 5, 3); threeScene.add(pl1);
    var pl2 = new THREE.PointLight(0x06ffa5, 1, 15); pl2.position.set(-3, -2, -3); threeScene.add(pl2);
    var grid = new THREE.GridHelper(20, 40, 0x1a1a3a, 0x0d0d24); grid.position.y = -3; threeScene.add(grid);

    var decay = 1.0;
    var tube = null;
    var time = 0;
    var camSpeed = 0.15;
    var conservation = 0;

    function generateTrefoil(d) {
        var N = 150, pts = [];
        for (var i = 0; i < N; i++) {
            var t = (i / N) * 2 * Math.PI;
            var x = (Math.sin(t) + 2 * Math.sin(2 * t)) * d;
            var y = (Math.cos(t) - 2 * Math.cos(2 * t)) * d;
            var z = (-Math.sin(3 * t)) * d;
            if (d < 1) {
                var dd = 1 - d;
                x += dd * 1.5 * Math.sin(7*t + dd*5) * (0.5 + 0.5*Math.cos(3*t));
                y += dd * 1.5 * Math.cos(5*t + dd*3) * (0.5 + 0.5*Math.sin(4*t));
                z += dd * 2.0 * Math.sin(9*t + dd*7) * Math.cos(2*t);
                if (dd > 0.4) {
                    x += dd*dd * Math.sin(23*t) * 0.8;
                    y += dd*dd * Math.cos(19*t) * 0.8;
                    z += dd*dd * Math.sin(17*t) * 0.8;
                }
            }
            pts.push(new THREE.Vector3(x, y, z));
        }
        return pts;
    }

    function computeH(pts) {
        var N = pts.length, H = 0, H0 = 0;
        for (var i = 0; i < N; i++) {
            var p = pts[i], pn = pts[(i+1) % N];
            H += p.distanceToSquared(pn);
            var t0 = (i / N) * 2 * Math.PI, t1 = ((i+1) / N) * 2 * Math.PI;
            var x0 = Math.sin(t0)+2*Math.sin(2*t0), x1 = Math.sin(t1)+2*Math.sin(2*t1);
            var y0 = Math.cos(t0)-2*Math.cos(2*t0), y1 = Math.cos(t1)-2*Math.cos(2*t1);
            var z0 = -Math.sin(3*t0), z1 = -Math.sin(3*t1);
            H0 += (x1-x0)*(x1-x0)+(y1-y0)*(y1-y0)+(z1-z0)*(z1-z0);
        }
        return ((H - H0) / H0) * 100;
    }

    function buildTube(pts, d) {
        if (tube) { tube.geometry.dispose(); tube.material.dispose(); threeScene.remove(tube); }
        var curve = new THREE.CatmullRomCurve3(pts, true);
        var radius = 0.08 * d + 0.02;
        var geo = new THREE.TubeGeometry(curve, Math.min(pts.length, 200), radius, 8, true);
        var mat = new THREE.MeshPhongMaterial({
            color: 0x38bdf8, emissive: 0x0a1a3a, transparent: true,
            opacity: 0.3 + 0.6 * d, shininess: 80
        });
        tube = new THREE.Mesh(geo, mat);
        threeScene.add(tube);
    }

    // Initial build
    var pts = generateTrefoil(1.0);
    buildTube(pts, 1.0);
    conservation = computeH(pts);

    // ── Controls: dissipation + camera speed ──
    var ctrl = document.getElementById('controls');
    ctrl.className = 'controls visible';
    ctrl.innerHTML =
        '<span class="ctrl-label">DISSIPATION</span>' +
        '<input type="range" class="ctrl-slider" min="0" max="100" step="1" value="0" id="trefoil-decay">' +
        '<span class="ctrl-value" id="trefoil-decay-val" style="color:var(--cyan)">0%</span>' +
        '<span class="ctrl-sep"></span>' +
        '<span class="ctrl-label">CAMERA</span>' +
        '<input type="range" class="ctrl-slider" min="0" max="100" step="1" value="30" id="trefoil-cam">';
    document.getElementById('trefoil-decay').oninput = function() {
        var pct = parseInt(this.value);
        decay = 1.0 - pct / 100;
        document.getElementById('trefoil-decay-val').textContent = pct + '%';
        pts = generateTrefoil(decay);
        buildTube(pts, decay);
        conservation = computeH(pts);
        updateHUD();
    };
    document.getElementById('trefoil-cam').oninput = function() { camSpeed = parseInt(this.value) / 200; };

    function updateHUD() {
        var topo = decay > 0.5 ? 'TREFOIL 3\u2081' : decay > 0.1 ? 'DISSOLVING' : 'PHONON GAS';
        document.getElementById('hud').innerHTML =
            '<div class="hud-card"><div class="hud-label">Hamiltonian \u0394H/H\u2080</div><div class="hud-value cyan">' + conservation.toFixed(2) + '%</div><div class="hud-sub">energy deviation</div></div>' +
            '<div class="hud-card"><div class="hud-label">Decay Factor</div><div class="hud-value cyan">' + decay.toFixed(2) + '</div><div class="hud-sub">1.00 = intact</div></div>' +
            '<div class="hud-card"><div class="hud-label">Topology</div><div class="hud-value cyan">' + topo + '</div><div class="hud-sub">non-axiomatic Beltrami</div></div>' +
            '<div class="hud-card"><div class="hud-label">Dissipation</div><div class="hud-value cyan">' + ((1-decay)*100).toFixed(0) + '%</div><div class="hud-sub">knot \u2192 phonon</div></div>';
    }
    updateHUD();

    function animate() {
        time += 0.016;
        threeCamera.position.x = 8 * Math.cos(time * camSpeed);
        threeCamera.position.z = 8 * Math.sin(time * camSpeed);
        threeCamera.position.y = 3 + Math.sin(time * camSpeed * 0.7);
        threeCamera.lookAt(0, 0, 0);
        threeRenderer.render(threeScene, threeCamera);
        threeRAF = requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('resize', function(){
        if (activeSim !== 'trefoil' || !threeRenderer) return;
        var w = container.clientWidth, h = container.clientHeight;
        threeCamera.aspect = w / h;
        threeCamera.updateProjectionMatrix();
        threeRenderer.setSize(w, h);
    });
}


// ═══════════════════════════════════════════════════════════════════
// SIM 3: LISA ACOUSTIC ECHO  —  Time slider + play/pause
// ═══════════════════════════════════════════════════════════════════
function initLisa() {
    var canvas = document.getElementById('lisa-canvas');
    canvas.style.display = 'block';
    var ctx = canvas.getContext('2d');

    activeWorker = new Worker('workers/worker-lisa.js');

    var frames = null;
    var currentFrame = 0;
    var playing = false;
    var playSpeed = 1;
    var totalTime = 0;
    var rMax = 20;
    var echoTimes = [];
    var peakThreshold = 1.5;

    // Loading state
    document.getElementById('hud').innerHTML =
        '<div class="hud-card"><div class="hud-label">Status</div><div class="hud-value magenta">COMPUTING\u2026</div><div class="hud-sub">pre-computing echo sequence</div></div>';

    activeWorker.postMessage({ type: 'precompute', resolution: 200, frames: 400, stepsPerFrame: 8 });

    activeWorker.onmessage = function(e) {
        if (e.data.type === 'precomputed') {
            frames = e.data.frames;
            totalTime = e.data.totalTime;
            rMax = e.data.rMax;

            // Detect echo peaks
            var lastPeak = false;
            for (var i = 0; i < frames.length; i++) {
                var isPeak = frames[i].coreDensity > peakThreshold;
                if (isPeak && !lastPeak) echoTimes.push(frames[i].time);
                lastPeak = isPeak;
            }

            setupControls();
            updateHUD();
        }
    };

    function setupControls() {
        var ctrl = document.getElementById('controls');
        ctrl.className = 'controls visible';
        ctrl.innerHTML =
            '<button class="ctrl-btn" id="lisa-play">\u25B6 PLAY</button>' +
            '<span class="ctrl-label">TIME</span>' +
            '<input type="range" class="ctrl-slider magenta" min="0" max="' + (frames.length - 1) + '" step="1" value="0" id="lisa-time">' +
            '<span class="ctrl-value" id="lisa-time-val" style="color:var(--magenta)">0.0 \u03C4</span>' +
            '<span class="ctrl-sep"></span>' +
            '<button class="ctrl-btn" id="lisa-speed">1\u00D7</button>';
        document.getElementById('lisa-play').onclick = function() {
            playing = !playing;
            this.textContent = playing ? '\u275A\u275A PAUSE' : '\u25B6 PLAY';
            this.classList.toggle('active', playing);
        };
        document.getElementById('lisa-time').oninput = function() {
            currentFrame = parseInt(this.value);
            playing = false;
            document.getElementById('lisa-play').textContent = '\u25B6 PLAY';
            document.getElementById('lisa-play').classList.remove('active');
            syncDisplay();
            updateHUD();
        };
        document.getElementById('lisa-speed').onclick = function() {
            playSpeed = playSpeed === 1 ? 2 : playSpeed === 2 ? 4 : 1;
            this.textContent = playSpeed + '\u00D7';
        };
    }

    function syncDisplay() {
        if (!frames) return;
        document.getElementById('lisa-time-val').textContent = frames[currentFrame].time.toFixed(1) + ' \u03C4';
        document.getElementById('lisa-time').value = currentFrame;
    }

    function updateHUD() {
        if (!frames) return;
        var f = frames[currentFrame];
        var echoCount = 0;
        for (var i = 0; i < echoTimes.length; i++) { if (echoTimes[i] <= f.time) echoCount++; }
        var echoPeriod = 0;
        if (echoTimes.length >= 2) {
            var p = [];
            for (var i = 1; i < echoTimes.length; i++) p.push(echoTimes[i] - echoTimes[i-1]);
            echoPeriod = p.reduce(function(a,b){return a+b},0) / p.length;
        }
        document.getElementById('hud').innerHTML =
            '<div class="hud-card"><div class="hud-label">Echo Period</div><div class="hud-value magenta">' + (echoPeriod > 0 ? echoPeriod.toFixed(1) : '\u2014') + '</div><div class="hud-sub">target: 44.7 \u03C4</div></div>' +
            '<div class="hud-card"><div class="hud-label">Echoes Observed</div><div class="hud-value magenta">' + Math.max(0, echoCount - 1) + '</div><div class="hud-sub">pressure bounces</div></div>' +
            '<div class="hud-card"><div class="hud-label">Core \u03C1(0)</div><div class="hud-value magenta">' + f.coreDensity.toFixed(3) + '</div><div class="hud-sub">\u03C1\u2080 units</div></div>' +
            '<div class="hud-card"><div class="hud-label">Sim Time</div><div class="hud-value magenta">' + f.time.toFixed(1) + '</div><div class="hud-sub">\u03C4_M units</div></div>';
    }

    function draw() {
        if (!frames) { lisaRAF = requestAnimationFrame(draw); return; }

        // Auto-advance if playing
        if (playing) {
            currentFrame = Math.min(currentFrame + playSpeed, frames.length - 1);
            if (currentFrame >= frames.length - 1) {
                playing = false;
                var pb = document.getElementById('lisa-play');
                if (pb) { pb.textContent = '\u25B6 PLAY'; pb.classList.remove('active'); }
            }
            syncDisplay();
            if (currentFrame % 4 === 0) updateHUD();
        }

        var f = frames[currentFrame];
        var W = canvas.parentElement.clientWidth;
        var H = canvas.parentElement.clientHeight;
        if (canvas.width !== W * 2 || canvas.height !== H * 2) {
            canvas.width = W * 2; canvas.height = H * 2;
            canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        }
        ctx.setTransform(2, 0, 0, 2, 0, 0);
        ctx.clearRect(0, 0, W, H);

        // Grid
        ctx.strokeStyle = 'rgba(26,26,58,0.4)'; ctx.lineWidth = 0.5;
        for (var x = 80; x < W; x += 80) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
        for (var y = 60; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

        // ── TOP: density profile ──
        var splitY = H * 0.55;
        var padL = 80, padR = 40, padT = 50, padB = 30;
        var chartW = W - padL - padR;
        var chartH = splitY - padT - padB;
        var rhoMax = 5;
        var dr = rMax / f.rho.length;

        function toX(r) { return padL + (r / rMax) * chartW; }
        function toYrho(v) { return padT + chartH - (Math.min(v, rhoMax) / rhoMax) * chartH; }

        ctx.strokeStyle = 'rgba(200,200,220,0.15)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(padL, padT); ctx.lineTo(padL, padT + chartH); ctx.lineTo(padL + chartW, padT + chartH); ctx.stroke();

        // Labels
        ctx.fillStyle = 'rgba(200,200,220,0.4)'; ctx.font = '10px JetBrains Mono'; ctx.textAlign = 'right';
        for (var v = 0; v <= rhoMax; v++) ctx.fillText(v.toFixed(0), padL - 8, toYrho(v) + 4);
        ctx.textAlign = 'center';
        for (var r = 0; r <= rMax; r += 5) ctx.fillText(r.toFixed(0), toX(r), padT + chartH + 16);

        // Density fill
        ctx.beginPath(); ctx.moveTo(toX(0), toYrho(0));
        for (var i = 0; i < f.rho.length; i++) ctx.lineTo(toX((i+0.5)*dr), toYrho(f.rho[i]));
        ctx.lineTo(toX(rMax), toYrho(0)); ctx.closePath();
        var grad = ctx.createLinearGradient(0, padT, 0, padT + chartH);
        grad.addColorStop(0, 'rgba(232,121,249,0.3)'); grad.addColorStop(1, 'rgba(232,121,249,0.02)');
        ctx.fillStyle = grad; ctx.fill();

        // Density line
        ctx.beginPath();
        for (var i = 0; i < f.rho.length; i++) {
            var px = toX((i+0.5)*dr), py = toYrho(f.rho[i]);
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.strokeStyle = '#e879f9'; ctx.lineWidth = 2; ctx.stroke();
        ctx.strokeStyle = 'rgba(232,121,249,0.2)'; ctx.lineWidth = 6; ctx.stroke();

        // Title
        ctx.fillStyle = '#e879f9'; ctx.font = 'bold 14px JetBrains Mono'; ctx.textAlign = 'center';
        ctx.fillText('GRAVASTAR DENSITY PROFILE \u2014 \u03C1(r, t)', W / 2, 28);
        ctx.fillStyle = 'rgba(200,200,220,0.3)'; ctx.font = '10px JetBrains Mono';
        ctx.fillText('t = ' + f.time.toFixed(1) + ' \u03C4_M', W / 2, 42);

        // ── BOTTOM: echo timeline ──
        var echoPadT = splitY + 20, echoPadB = 40;
        var echoChartH = H - echoPadT - echoPadB;
        var rhoHistMax = 5;

        function toXt(t) { return padL + (t / totalTime) * chartW; }
        function toYecho(v) { return echoPadT + echoChartH - (Math.min(v, rhoHistMax) / rhoHistMax) * echoChartH; }

        ctx.strokeStyle = 'rgba(200,200,220,0.15)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(padL, echoPadT); ctx.lineTo(padL, echoPadT + echoChartH); ctx.lineTo(padL + chartW, echoPadT + echoChartH); ctx.stroke();

        ctx.fillStyle = 'rgba(200,200,220,0.3)'; ctx.font = '10px JetBrains Mono'; ctx.textAlign = 'center';
        ctx.fillText('CORE DENSITY \u03C1(0, t) \u2014 ECHO RINGING', W / 2, echoPadT - 6);
        var tickInt = totalTime <= 60 ? 10 : totalTime <= 150 ? 25 : 50;
        for (var tt = 0; tt <= totalTime; tt += tickInt) ctx.fillText(tt.toFixed(0), toXt(tt), echoPadT + echoChartH + 16);

        // Full history (dimmed)
        ctx.beginPath();
        for (var i = 0; i < frames.length; i++) {
            var px = toXt(frames[i].time), py = toYecho(frames[i].coreDensity);
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.strokeStyle = 'rgba(232,121,249,0.1)'; ctx.lineWidth = 1; ctx.stroke();

        // History up to cursor (bright)
        ctx.beginPath();
        for (var i = 0; i <= currentFrame; i++) {
            var px = toXt(frames[i].time), py = toYecho(frames[i].coreDensity);
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.strokeStyle = '#e879f9'; ctx.lineWidth = 1.5; ctx.stroke();
        ctx.strokeStyle = 'rgba(232,121,249,0.12)'; ctx.lineWidth = 5; ctx.stroke();

        // Playhead cursor
        var cursorX = toXt(f.time);
        ctx.strokeStyle = 'rgba(232,121,249,0.8)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(cursorX, echoPadT); ctx.lineTo(cursorX, echoPadT + echoChartH); ctx.stroke();

        // Echo markers
        ctx.setLineDash([3,3]); ctx.strokeStyle = 'rgba(6,255,165,0.3)'; ctx.lineWidth = 1;
        for (var i = 0; i < echoTimes.length; i++) {
            var ex = toXt(echoTimes[i]);
            ctx.beginPath(); ctx.moveTo(ex, echoPadT); ctx.lineTo(ex, echoPadT + echoChartH); ctx.stroke();
        }
        ctx.setLineDash([]);

        // X axis label
        ctx.fillStyle = 'rgba(200,200,220,0.3)'; ctx.font = '10px JetBrains Mono'; ctx.textAlign = 'center';
        ctx.fillText('t (\u03C4_M units)', W / 2, H - 10);

        lisaRAF = requestAnimationFrame(draw);
    }
    draw();
}


// ═══ BOOT ═══
initMermin();

})();
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#06060e;--panel:#0a0a18;--border:#1a1a3a;--border-hi:#2a2a5a;
  --neon:#06ffa5;--neon-dim:rgba(6,255,165,0.15);--neon-glow:rgba(6,255,165,0.4);
  --cyan:#38bdf8;--cyan-dim:rgba(56,189,248,0.15);
  --magenta:#e879f9;--magenta-dim:rgba(232,121,249,0.15);
  --text:#c8ccd4;--text-dim:#5a5e6a;--text-bright:#f0f2f5;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--void);color:var(--text);font-family:var(--sans)}

/* ═══ LAYOUT ═══ */
.chamber{display:flex;flex-direction:column;height:100vh;width:100vw}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  height:48px;padding:0 20px;
  background:var(--panel);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:100;
}
.topbar-title{font:500 13px var(--mono);color:var(--text-dim);letter-spacing:0.08em;text-transform:uppercase}
.topbar-title span{color:var(--neon)}
.topbar-back{font:400 12px var(--mono);color:var(--text-dim);text-decoration:none;
  padding:4px 12px;border:1px solid var(--border);border-radius:6px;transition:all .2s}
.topbar-back:hover{color:var(--neon);border-color:var(--neon)}

/* ═══ RADIO BAR ═══ */
.radiobar{
  display:flex;align-items:stretch;height:56px;
  background:var(--panel);border-bottom:1px solid var(--border);
  flex-shrink:0;position:relative;z-index:90;
}
.radio-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:10px;
  background:transparent;border:none;border-bottom:2px solid transparent;
  color:var(--text-dim);font:500 12px var(--mono);letter-spacing:0.04em;
  cursor:pointer;transition:all .25s;position:relative;padding:0 12px;
  text-transform:uppercase;
}
.radio-btn:hover{color:var(--text);background:rgba(255,255,255,0.02)}
.radio-btn.active{color:var(--neon);border-bottom-color:var(--neon);background:var(--neon-dim)}
.radio-btn[data-sim="trefoil"].active{color:var(--cyan);border-bottom-color:var(--cyan);background:var(--cyan-dim)}
.radio-btn[data-sim="lisa"].active{color:var(--magenta);border-bottom-color:var(--magenta);background:var(--magenta-dim)}
.radio-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid currentColor;flex-shrink:0;transition:all .25s}
.radio-btn.active .radio-dot{background:currentColor;box-shadow:0 0 8px currentColor}
.radio-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ═══ VIEWPORT ═══ */
.viewport{flex:1;position:relative;overflow:hidden;background:var(--void)}
.viewport canvas,.viewport .sim-container{position:absolute;inset:0;width:100%!important;height:100%!important}

/* ═══ FADE OVERLAY ═══ */
.fade-overlay{
  position:absolute;inset:0;background:var(--void);z-index:50;
  opacity:0;pointer-events:none;transition:opacity .35s ease;
}
.fade-overlay.active{opacity:1;pointer-events:all}

/* ═══ HUD ═══ */
.hud{
  display:flex;gap:10px;padding:10px 20px;
  background:var(--panel);border-top:1px solid var(--border);
  flex-shrink:0;overflow-x:auto;align-items:stretch;
}
.hud-card{
  background:rgba(20,20,40,0.6);
  border:1px solid var(--border);border-radius:8px;padding:10px 14px;
  min-width:160px;flex-shrink:0;
}
.hud-label{font:500 9px var(--mono);color:var(--text-dim);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px}
.hud-value{font:600 18px var(--mono);color:var(--neon);line-height:1.2}
.hud-value.cyan{color:var(--cyan)}
.hud-value.magenta{color:var(--magenta)}
.hud-sub{font:400 10px var(--mono);color:var(--text-dim);margin-top:2px}

/* ═══ CONTROLS BAR ═══ */
.controls{
  display:none;align-items:center;gap:16px;padding:0 20px;height:40px;
  background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;
}
.controls.visible{display:flex}
.ctrl-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);
  font:400 11px var(--mono);padding:4px 12px;border-radius:4px;cursor:pointer;transition:all .2s}
.ctrl-btn:hover,.ctrl-btn.active{color:var(--cyan);border-color:var(--cyan)}
.ctrl-label{font:400 10px var(--mono);color:var(--text-dim);white-space:nowrap}
.ctrl-slider{-webkit-appearance:none;appearance:none;height:3px;background:var(--border);
  border-radius:2px;outline:none;flex:1;max-width:250px}
.ctrl-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:var(--cyan);cursor:pointer}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .radio-btn{font-size:10px;gap:6px;padding:0 8px}
  .radio-label{font-size:9px}
  .hud{padding:8px 12px;gap:6px}
  .hud-card{padding:6px 10px;min-width:120px}
  .hud-value{font-size:14px}
  .topbar{padding:0 12px}
}
@media(max-width:480px){
  .radiobar{height:48px}
  .radio-label{display:none}
}

/* ═══ SLIDER VARIANTS ═══ */
.ctrl-slider.neon::-webkit-slider-thumb{background:var(--neon)}
.ctrl-slider.magenta::-webkit-slider-thumb{background:var(--magenta)}
.ctrl-value{font:600 12px var(--mono);color:var(--text-bright);min-width:50px}
.ctrl-sep{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0}
</style>
</head>
<body>

<div class="chamber">
  <!-- ═══ TOP BAR ═══ -->
  <div class="topbar">
    <div class="topbar-title"><span>UHF</span> Simulation Chamber <span>v8.0</span></div>
    <a href="index.html" class="topbar-back">← Main</a>
  </div>

  <!-- ═══ RADIO BAR ═══ -->
  <div class="radiobar" id="radiobar">
    <button class="radio-btn active" data-sim="mermin" onclick="switchSim('mermin')">
      <span class="radio-dot"></span>
      <span class="radio-label">The Mermin-Tesla Singularity</span>
    </button>
    <button class="radio-btn" data-sim="trefoil" onclick="switchSim('trefoil')">
      <span class="radio-dot"></span>
      <span class="radio-label">The Trefoil Reconnection</span>
    </button>
    <button class="radio-btn" data-sim="lisa" onclick="switchSim('lisa')">
      <span class="radio-dot"></span>
      <span class="radio-label">The LISA Acoustic Echo</span>
    </button>
  </div>

  <!-- ═══ VIEWPORT ═══ -->
  <div class="viewport" id="viewport">
    <div class="fade-overlay" id="fade"></div>

    <!-- Mermin container (2D canvas) -->
    <canvas id="mermin-canvas" class="sim-container" style="display:block"></canvas>

    <!-- Trefoil container (Three.js) -->
    <div id="trefoil-container" class="sim-container" style="display:none"></div>

    <!-- LISA container (2D canvas) -->
    <canvas id="lisa-canvas" class="sim-container" style="display:none"></canvas>
  </div>

  <!-- Controls bar (play/pause, sliders) -->
  <div class="controls" id="controls"></div>

  <!-- HUD (dedicated bottom strip) -->
  <div class="hud" id="hud"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CHAMBER CONTROLLER — Lazy-Unload Protocol
// ═══════════════════════════════════════════════════════════════════
(function(){
'use strict';

let activeSim = 'mermin';
let activeWorker = null;
let threeScene = null, threeRenderer = null, threeCamera = null, threeRAF = null;
let merminRAF = null, lisaRAF = null;
let lisaState = null;

// ═══ MEMORY SANITIZATION ═══
function purge() {
    // Terminate active worker
    if (activeWorker) { activeWorker.terminate(); activeWorker = null; }
    // Cancel animation frames
    if (merminRAF) { cancelAnimationFrame(merminRAF); merminRAF = null; }
    if (lisaRAF) { cancelAnimationFrame(lisaRAF); lisaRAF = null; }
    if (threeRAF) { cancelAnimationFrame(threeRAF); threeRAF = null; }
    // Dispose Three.js
    if (threeScene) {
        threeScene.traverse(function(obj) {
            if (obj.geometry) obj.geometry.dispose();
            if (obj.material) {
                if (Array.isArray(obj.material)) obj.material.forEach(function(m){m.dispose()});
                else obj.material.dispose();
            }
            if (obj.texture) obj.texture.dispose();
        });
        threeScene = null;
    }
    if (threeRenderer) {
        threeRenderer.dispose();
        threeRenderer.forceContextLoss();
        var gl = threeRenderer.domElement;
        if (gl && gl.parentNode) gl.parentNode.removeChild(gl);
        threeRenderer = null;
    }
    threeCamera = null;
    lisaState = null;
    // Clear HUD
    document.getElementById('hud').innerHTML = '';
    document.getElementById('controls').className = 'controls';
    document.getElementById('controls').innerHTML = '';
}

// ═══ FADE TRANSITION ═══
function fadeTransition(cb) {
    var overlay = document.getElementById('fade');
    overlay.classList.add('active');
    setTimeout(function(){
        cb();
        setTimeout(function(){ overlay.classList.remove('active'); }, 80);
    }, 350);
}

// ═══ SWITCH SIMULATION ═══
window.switchSim = function(sim) {
    if (sim === activeSim) return;
    fadeTransition(function(){
        purge();
        // Hide all containers
        document.getElementById('mermin-canvas').style.display = 'none';
        document.getElementById('trefoil-container').style.display = 'none';
        document.getElementById('lisa-canvas').style.display = 'none';
        // Update radio buttons
        document.querySelectorAll('.radio-btn').forEach(function(b){
            b.classList.toggle('active', b.dataset.sim === sim);
        });
        activeSim = sim;
        // Cold start
        if (sim === 'mermin') initMermin();
        else if (sim === 'trefoil') initTrefoil();
        else if (sim === 'lisa') initLisa();
    });
};

// ═══════════════════════════════════════════════════════════════════
// SIM 1: MERMIN-TESLA SINGULARITY — Exponential Violation Graph
// ═══════════════════════════════════════════════════════════════════
function initMermin() {
    var canvas = document.getElementById('mermin-canvas');
    canvas.style.display = 'block';
    var ctx = canvas.getContext('2d');

    // Launch worker
    activeWorker = new Worker('workers/worker-mermin.js');
    var data = null;
    activeWorker.postMessage({ type: 'compute' });
    activeWorker.onmessage = function(e) {
        if (e.data.type === 'result') data = e.data;
    };

    var t = 0;
    function draw() {
        var W = canvas.parentElement.clientWidth;
        var H = canvas.parentElement.clientHeight;
        if (canvas.width !== W * 2 || canvas.height !== H * 2) {
            canvas.width = W * 2; canvas.height = H * 2;
            canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        }
        ctx.setTransform(2, 0, 0, 2, 0, 0);
        ctx.clearRect(0, 0, W, H);

        // Background grid
        ctx.strokeStyle = 'rgba(26,26,58,0.5)';
        ctx.lineWidth = 0.5;
        var gx = 80, gy = 60;
        for (var x = gx; x < W; x += gx) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
        for (var y = gy; y < H; y += gy) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

        if (!data) { merminRAF = requestAnimationFrame(draw); return; }
        t += 0.016;

        var results = data.results; // N=2..8
        var padL = 100, padR = 60, padT = 80, padB = 100;
        var chartW = W - padL - padR;
        var chartH = H - padT - padB;

        // Use linear scale for dramatic effect
        var yMax = 160; // enough to show N=8 at 128

        function toX(N) { return padL + ((N - 2) / 6) * chartW; }
        function toY(v) { return padT + chartH - (v / yMax) * chartH; }

        // Axes
        ctx.strokeStyle = 'rgba(200,200,220,0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(padL, padT); ctx.lineTo(padL, padT + chartH); ctx.lineTo(padL + chartW, padT + chartH); ctx.stroke();

        // X axis labels
        ctx.fillStyle = 'rgba(200,200,220,0.5)';
        ctx.font = '11px JetBrains Mono';
        ctx.textAlign = 'center';
        for (var n = 2; n <= 8; n++) {
            ctx.fillText('N=' + n, toX(n), padT + chartH + 20);
        }
        // Y axis labels
        ctx.textAlign = 'right';
        for (var v = 0; v <= yMax; v += 32) {
            ctx.fillStyle = 'rgba(200,200,220,0.3)';
            ctx.fillText(v.toFixed(0), padL - 10, toY(v) + 4);
            ctx.strokeStyle = 'rgba(200,200,220,0.05)';
            ctx.beginPath(); ctx.moveTo(padL, toY(v)); ctx.lineTo(padL + chartW, toY(v)); ctx.stroke();
        }

        // Classical bound line (|M_N| = 2)
        ctx.strokeStyle = 'rgba(244,114,182,0.4)';
        ctx.lineWidth = 1;
        ctx.setLineDash([6,4]);
        ctx.beginPath(); ctx.moveTo(padL, toY(2)); ctx.lineTo(padL + chartW, toY(2)); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(244,114,182,0.6)';
        ctx.textAlign = 'left';
        ctx.font = '10px JetBrains Mono';
        ctx.fillText('LHV BOUND = 2', padL + 8, toY(2) - 6);

        // Exponential curve (smooth)
        ctx.strokeStyle = 'rgba(6,255,165,0.6)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        for (var i = 0; i <= 120; i++) {
            var N = 2 + (i / 120) * 6;
            var val = Math.pow(2, N - 1);
            var pulse = 1 + Math.sin(t * 3 + i * 0.05) * 0.005;
            var px = toX(N), py = toY(val * pulse);
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.stroke();
        // Glow
        ctx.strokeStyle = 'rgba(6,255,165,0.15)';
        ctx.lineWidth = 8;
        ctx.stroke();

        // Data points
        for (var j = 0; j < results.length; j++) {
            var r = results[j];
            var px = toX(r.N), py = toY(r.quantum);
            var isN7 = r.N === 7;
            var radius = isN7 ? 7 : 5;
            var glow = isN7 ? 20 : 10;

            // Glow
            ctx.beginPath(); ctx.arc(px, py, glow + Math.sin(t * 4 + j) * 3, 0, Math.PI * 2);
            ctx.fillStyle = isN7 ? 'rgba(6,255,165,0.12)' : 'rgba(6,255,165,0.06)';
            ctx.fill();

            // Point
            ctx.beginPath(); ctx.arc(px, py, radius, 0, Math.PI * 2);
            ctx.fillStyle = isN7 ? '#06ffa5' : 'rgba(6,255,165,0.8)';
            ctx.fill();
            ctx.strokeStyle = isN7 ? '#fff' : 'rgba(255,255,255,0.3)';
            ctx.lineWidth = isN7 ? 2 : 1;
            ctx.stroke();

            // Value label
            ctx.fillStyle = isN7 ? '#ffffff' : 'rgba(200,200,220,0.6)';
            ctx.font = isN7 ? 'bold 12px JetBrains Mono' : '10px JetBrains Mono';
            ctx.textAlign = 'center';
            if (isN7) {
                // Emphasize N=7 with callout
                ctx.fillStyle = '#06ffa5';
                ctx.font = 'bold 13px JetBrains Mono';
                ctx.fillText('64.0', px, py - 22);
                ctx.fillStyle = 'rgba(200,200,220,0.5)';
                ctx.font = '9px JetBrains Mono';
                ctx.fillText('LHV PAIRWISE MODEL: RULED OUT', px, py - 10);
            } else {
                ctx.fillText(r.quantum.toFixed(1), px, py - 12);
            }
        }

        // Title
        ctx.fillStyle = '#06ffa5';
        ctx.font = 'bold 16px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.fillText('MERMIN–KLYSHKO SCALING: |⟨M_N⟩| = 2^{N−1}', W / 2, 35);
        ctx.fillStyle = 'rgba(200,200,220,0.4)';
        ctx.font = '11px JetBrains Mono';
        ctx.fillText('Each vortex loop doubles the operator: |M_N| = 2 × |M_{N−1}|', W / 2, 55);

        // X axis title
        ctx.fillStyle = 'rgba(200,200,220,0.4)';
        ctx.font = '11px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.fillText('N (number of entangled vortex loops)', W / 2, padT + chartH + 45);

        // Y axis title
        ctx.save();
        ctx.translate(20, H / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.fillStyle = 'rgba(200,200,220,0.4)';
        ctx.font = '11px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.fillText('|⟨M_N⟩| (quantum maximum)', 0, 0);
        ctx.restore();

        merminRAF = requestAnimationFrame(draw);
    }

    // HUD
    document.getElementById('hud').innerHTML =
        '<div class="hud-card"><div class="hud-label">N=7 Quantum Max</div><div class="hud-value">64.0</div><div class="hud-sub">= 2⁶ (exact)</div></div>' +
        '<div class="hud-card"><div class="hud-label">Violation Ratio</div><div class="hud-value">32×</div><div class="hud-sub">above LHV bound</div></div>' +
        '<div class="hud-card"><div class="hud-label">Recursion</div><div class="hud-value">|M_N| = 2|M_{N−1}|</div><div class="hud-sub">doubling per vortex</div></div>' +
        '<div class="hud-card"><div class="hud-label">LHV Pairwise Model</div><div class="hud-value" style="color:#f472b6">RULED OUT</div><div class="hud-sub">by N≥3 scaling</div></div>';

    draw();
}

// ═══════════════════════════════════════════════════════════════════
// SIM 2: TREFOIL RECONNECTION — 3D NAB Evolution
// ═══════════════════════════════════════════════════════════════════
function initTrefoil() {
    var container = document.getElementById('trefoil-container');
    container.style.display = 'block';
    container.innerHTML = '';

    var W = container.clientWidth, H = container.clientHeight;

    // Three.js setup
    threeScene = new THREE.Scene();
    threeCamera = new THREE.PerspectiveCamera(55, W / H, 0.1, 100);
    threeCamera.position.set(0, 3, 8);
    threeCamera.lookAt(0, 0, 0);

    threeRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    threeRenderer.setSize(W, H);
    threeRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    threeRenderer.setClearColor(0x06060e, 1);
    container.appendChild(threeRenderer.domElement);

    // Lighting
    var ambientLight = new THREE.AmbientLight(0x1a1a4e, 0.4);
    threeScene.add(ambientLight);
    var pointLight = new THREE.PointLight(0x38bdf8, 2, 20);
    pointLight.position.set(3, 5, 3);
    threeScene.add(pointLight);
    var pointLight2 = new THREE.PointLight(0x06ffa5, 1, 15);
    pointLight2.position.set(-3, -2, -3);
    threeScene.add(pointLight2);

    // Grid floor
    var gridHelper = new THREE.GridHelper(20, 40, 0x1a1a3a, 0x0d0d24);
    gridHelper.position.y = -3;
    threeScene.add(gridHelper);

    // Launch worker to get initial trefoil geometry
    activeWorker = new Worker('workers/worker-trefoil.js');
    activeWorker.postMessage({ type: 'compute', resolution: 150 });

    var trefoilLine = null;
    var trefoilPoints = null;
    var phonons = [];
    var time = 0;
    var hamiltonian0 = 0;
    var conservation = 0;
    var decay = 1;
    var waitingForWorker = false;
    var trefoilPaused = false;
    var frameCount = 0;
    var smoothCons = 0;

    activeWorker.onmessage = function(e) {
        if (e.data.type === 'geometry') {
            trefoilPoints = e.data.points;
            buildTrefoil(trefoilPoints);
            // Compute initial Hamiltonian
            hamiltonian0 = 0;
            for (var i = 0; i < trefoilPoints.length; i++) {
                var p = trefoilPoints[i];
                var pn = trefoilPoints[(i+1) % trefoilPoints.length];
                hamiltonian0 += (pn.x-p.x)**2 + (pn.y-p.y)**2 + (pn.z-p.z)**2;
            }
            hamiltonian0 *= 0.5;
        }
        if (e.data.type === 'evolved') {
            waitingForWorker = false;
            trefoilPoints = e.data.points;
            conservation = e.data.conservation;
            decay = e.data.decay;
            updateTrefoilGeometry(trefoilPoints);
            // Spawn phonon particles when decaying
            if (decay < 0.8 && Math.random() > 0.7) {
                spawnPhonon();
            }
        }
    };

    function buildTrefoil(pts) {
        var positions = new Float32Array(pts.length * 3);
        for (var i = 0; i < pts.length; i++) {
            positions[i*3] = pts[i].x;
            positions[i*3+1] = pts[i].y;
            positions[i*3+2] = pts[i].z;
        }
        var geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        var material = new THREE.LineBasicMaterial({
            color: 0x38bdf8,
            linewidth: 2,
            transparent: true,
            opacity: 0.9
        });
        trefoilLine = new THREE.LineLoop(geometry, material);
        threeScene.add(trefoilLine);

        // Add tube for thickness
        var curve = new THREE.CatmullRomCurve3(
            pts.map(function(p){ return new THREE.Vector3(p.x, p.y, p.z); }),
            true
        );
        var tubeGeo = new THREE.TubeGeometry(curve, pts.length, 0.08, 8, true);
        var tubeMat = new THREE.MeshPhongMaterial({
            color: 0x38bdf8,
            emissive: 0x0a1a3a,
            transparent: true,
            opacity: 0.7,
            shininess: 80
        });
        var tube = new THREE.Mesh(tubeGeo, tubeMat);
        tube.name = 'trefoil-tube';
        threeScene.add(tube);
    }

    function updateTrefoilGeometry(pts) {
        if (!trefoilLine) return;
        var pos = trefoilLine.geometry.attributes.position;
        for (var i = 0; i < pts.length; i++) {
            pos.array[i*3] = pts[i].x;
            pos.array[i*3+1] = pts[i].y;
            pos.array[i*3+2] = pts[i].z;
        }
        pos.needsUpdate = true;

        // Update tube
        var oldTube = threeScene.getObjectByName('trefoil-tube');
        if (oldTube) {
            oldTube.geometry.dispose();
            threeScene.remove(oldTube);
        }
        var curve = new THREE.CatmullRomCurve3(
            pts.map(function(p){ return new THREE.Vector3(p.x, p.y, p.z); }),
            true
        );
        var radius = 0.08 * decay + 0.02;
        var tubeGeo = new THREE.TubeGeometry(curve, Math.min(pts.length, 200), radius, 8, true);
        var opacity = 0.3 + 0.6 * decay;
        var tubeMat = new THREE.MeshPhongMaterial({
            color: 0x38bdf8,
            emissive: 0x0a1a3a,
            transparent: true,
            opacity: opacity,
            shininess: 80
        });
        var tube = new THREE.Mesh(tubeGeo, tubeMat);
        tube.name = 'trefoil-tube';
        threeScene.add(tube);
    }

    function spawnPhonon() {
        if (!trefoilPoints || trefoilPoints.length === 0) return;
        var idx = Math.floor(Math.random() * trefoilPoints.length);
        var p = trefoilPoints[idx];
        var geo = new THREE.SphereGeometry(0.03, 6, 6);
        var mat = new THREE.MeshBasicMaterial({ color: 0x06ffa5, transparent: true, opacity: 0.8 });
        var sphere = new THREE.Mesh(geo, mat);
        sphere.position.set(p.x, p.y, p.z);
        sphere.userData = {
            vx: (Math.random()-0.5)*0.1,
            vy: (Math.random()-0.5)*0.1,
            vz: (Math.random()-0.5)*0.1,
            life: 1.0
        };
        threeScene.add(sphere);
        phonons.push(sphere);
    }

    function animate() {
        time += 0.016;
        frameCount++;

        // Evolve trefoil via worker (one-at-a-time, throttled)
        if (trefoilPoints && activeWorker && time > 0.3 && !trefoilPaused && !waitingForWorker && frameCount % 3 === 0) {
            waitingForWorker = true;
            activeWorker.postMessage({
                type: 'evolve',
                points: trefoilPoints,
                dt: 0.008,
                time: time,
                dissipation: 0.06
            });
        }

        // Rotate camera
        threeCamera.position.x = 8 * Math.cos(time * 0.15);
        threeCamera.position.z = 8 * Math.sin(time * 0.15);
        threeCamera.position.y = 3 + Math.sin(time * 0.1);
        threeCamera.lookAt(0, 0, 0);

        // Update phonons
        for (var i = phonons.length - 1; i >= 0; i--) {
            var ph = phonons[i];
            ph.position.x += ph.userData.vx;
            ph.position.y += ph.userData.vy;
            ph.position.z += ph.userData.vz;
            ph.userData.life -= 0.008;
            ph.material.opacity = ph.userData.life * 0.6;
            if (ph.userData.life <= 0) {
                ph.geometry.dispose();
                ph.material.dispose();
                threeScene.remove(ph);
                phonons.splice(i, 1);
            }
        }

        // Update HUD (smoothed values)
        smoothCons = smoothCons * 0.9 + conservation * 0.1;
        if (frameCount % 10 === 0) {
            document.getElementById('hud').innerHTML =
                '<div class="hud-card"><div class="hud-label">Hamiltonian ΔH/H₀</div><div class="hud-value cyan">' + smoothCons.toFixed(3) + '%</div><div class="hud-sub">target: -0.000148%</div></div>' +
                '<div class="hud-card"><div class="hud-label">Decay Factor</div><div class="hud-value cyan">' + decay.toFixed(2) + '</div><div class="hud-sub">knot → phonon transition</div></div>' +
                '<div class="hud-card"><div class="hud-label">Phonon Count</div><div class="hud-value cyan">' + phonons.length + '</div><div class="hud-sub">acoustic emissions</div></div>' +
                '<div class="hud-card"><div class="hud-label">Topology</div><div class="hud-value cyan">' + (decay > 0.5 ? 'TREFOIL 3₁' : decay > 0.1 ? 'DISSOLVING' : 'PHONON GAS') + '</div><div class="hud-sub">non-axiomatic Beltrami</div></div>';
        }

        threeRenderer.render(threeScene, threeCamera);
        threeRAF = requestAnimationFrame(animate);
    }

    // HUD initial
    document.getElementById('hud').innerHTML =
        '<div class="hud-card"><div class="hud-label">Hamiltonian ΔH/H₀</div><div class="hud-value cyan">0.000%</div><div class="hud-sub">target: -0.000148%</div></div>' +
        '<div class="hud-card"><div class="hud-label">Status</div><div class="hud-value cyan">INITIALIZING</div><div class="hud-sub">computing trefoil T₂,₃</div></div>';

    // Controls bar: play/pause + reset
    var ctrl = document.getElementById('controls');
    ctrl.className = 'controls visible';
    ctrl.innerHTML = '<button class="ctrl-btn active" id="trefoil-play">▶ PLAY</button>' +
        '<button class="ctrl-btn" id="trefoil-reset">↺ RESET</button>' +
        '<span class="ctrl-label">t = <span id="trefoil-time">0.00</span></span>';
    document.getElementById('trefoil-play').onclick = function() {
        trefoilPaused = !trefoilPaused;
        this.textContent = trefoilPaused ? '❚❚ PAUSED' : '▶ PLAY';
        this.classList.toggle('active', !trefoilPaused);
    };
    document.getElementById('trefoil-reset').onclick = function() {
        waitingForWorker = false;
        time = 0; frameCount = 0; smoothCons = 0;
        conservation = 0; decay = 1;
        phonons.forEach(function(ph) { ph.geometry.dispose(); ph.material.dispose(); threeScene.remove(ph); });
        phonons = [];
        activeWorker.postMessage({ type: 'compute', resolution: 150 });
    };

    animate();

    // Resize handler
    window.addEventListener('resize', function(){
        if (activeSim !== 'trefoil' || !threeRenderer) return;
        var w = container.clientWidth, h = container.clientHeight;
        threeCamera.aspect = w / h;
        threeCamera.updateProjectionMatrix();
        threeRenderer.setSize(w, h);
    });
}


// ═══════════════════════════════════════════════════════════════════
// SIM 3: LISA ACOUSTIC ECHO — Gaussian Pressure Ringing
// ═══════════════════════════════════════════════════════════════════
function initLisa() {
    var canvas = document.getElementById('lisa-canvas');
    canvas.style.display = 'block';
    var ctx = canvas.getContext('2d');

    activeWorker = new Worker('workers/worker-lisa.js');

    var Nr = 512;
    var rMax = 20.0;
    var dr = rMax / Nr;
    lisaState = null;
    var echoTimes = [];
    var coreDensityHistory = [];
    var peakThreshold = 1.8;
    var lastPeak = false;

    activeWorker.postMessage({ type: 'init', resolution: Nr });

    activeWorker.onmessage = function(e) {
        if (e.data.type === 'state') {
            lisaState = e.data;
            // Track core density for echo detection
            if (e.data.coreDensity !== undefined) {
                coreDensityHistory.push({ t: e.data.time, rho: e.data.coreDensity });
                if (coreDensityHistory.length > 2000) coreDensityHistory.shift();
                // Detect peaks
                var isPeak = e.data.coreDensity > peakThreshold;
                if (isPeak && !lastPeak) {
                    echoTimes.push(e.data.time);
                }
                lastPeak = isPeak;
            }
        }
    };

    var t = 0;
    function draw() {
        var W = canvas.parentElement.clientWidth;
        var H = canvas.parentElement.clientHeight;
        if (canvas.width !== W * 2 || canvas.height !== H * 2) {
            canvas.width = W * 2; canvas.height = H * 2;
            canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        }
        ctx.setTransform(2, 0, 0, 2, 0, 0);
        ctx.clearRect(0, 0, W, H);

        // Step the simulation
        if (lisaState && lisaState.rho) {
            activeWorker.postMessage({
                type: 'step',
                rho: lisaState.rho,
                vel: lisaState.vel,
                dt: 0.08,
                dr: dr,
                Nr: Nr,
                time: lisaState.time || 0
            });
        }

        t += 0.016;

        // Background grid
        ctx.strokeStyle = 'rgba(26,26,58,0.4)';
        ctx.lineWidth = 0.5;
        for (var x = 80; x < W; x += 80) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
        for (var y = 60; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

        if (!lisaState || !lisaState.rho) { lisaRAF = requestAnimationFrame(draw); return; }

        // Split viewport: top = density profile, bottom = echo timeline
        var splitY = H * 0.55;

        // ═══ TOP: Radial density profile ═══
        var padL = 80, padR = 40, padT = 50, padB = 30;
        var chartW = W - padL - padR;
        var chartH = splitY - padT - padB;
        var rhoMax = 6;

        function toX(r) { return padL + (r / rMax) * chartW; }
        function toYrho(v) { return padT + chartH - (Math.min(v, rhoMax) / rhoMax) * chartH; }

        // Axis
        ctx.strokeStyle = 'rgba(200,200,220,0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(padL, padT); ctx.lineTo(padL, padT + chartH); ctx.lineTo(padL + chartW, padT + chartH); ctx.stroke();

        // Labels
        ctx.fillStyle = 'rgba(200,200,220,0.4)';
        ctx.font = '10px JetBrains Mono';
        ctx.textAlign = 'right';
        for (var v = 0; v <= rhoMax; v += 1) {
            ctx.fillText(v.toFixed(0), padL - 8, toYrho(v) + 4);
        }
        ctx.textAlign = 'center';
        for (var r = 0; r <= rMax; r += 5) {
            ctx.fillText(r.toFixed(0), toX(r), padT + chartH + 16);
        }

        // Density profile (filled)
        ctx.beginPath();
        ctx.moveTo(toX(0), toYrho(0));
        for (var i = 0; i < lisaState.rho.length; i++) {
            var r = (i + 0.5) * dr;
            ctx.lineTo(toX(r), toYrho(lisaState.rho[i]));
        }
        ctx.lineTo(toX(rMax), toYrho(0));
        ctx.closePath();
        var grad = ctx.createLinearGradient(0, padT, 0, padT + chartH);
        grad.addColorStop(0, 'rgba(232,121,249,0.3)');
        grad.addColorStop(1, 'rgba(232,121,249,0.02)');
        ctx.fillStyle = grad;
        ctx.fill();

        // Density line
        ctx.beginPath();
        for (var i = 0; i < lisaState.rho.length; i++) {
            var r = (i + 0.5) * dr;
            var px = toX(r), py = toYrho(lisaState.rho[i]);
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.strokeStyle = '#e879f9';
        ctx.lineWidth = 2;
        ctx.stroke();
        // Glow
        ctx.strokeStyle = 'rgba(232,121,249,0.2)';
        ctx.lineWidth = 6;
        ctx.stroke();

        // Quantum pressure zone marker
        ctx.fillStyle = 'rgba(232,121,249,0.1)';
        ctx.fillRect(toX(0), padT, toX(2) - toX(0), chartH);
        ctx.fillStyle = 'rgba(232,121,249,0.5)';
        ctx.font = '9px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.fillText('Q-PRESSURE', toX(1), padT + 14);
        ctx.fillText('ZONE', toX(1), padT + 25);

        // Title
        ctx.fillStyle = '#e879f9';
        ctx.font = 'bold 14px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.fillText('GRAVASTAR DENSITY PROFILE — ρ(r, t)', W / 2, 28);
        ctx.fillStyle = 'rgba(200,200,220,0.3)';
        ctx.font = '10px JetBrains Mono';
        ctx.fillText('t = ' + (lisaState.time || 0).toFixed(1) + ' τ_M', W / 2, 42);

        // ═══ BOTTOM: Echo timeline ═══
        var echoPadT = splitY + 20;
        var echoPadB = 40;
        var echoChartH = H - echoPadT - echoPadB;
        var simTime = lisaState.time || 0;
        var tMax = simTime < 60 ? 60 : simTime < 150 ? simTime * 1.2 : Math.max(200, simTime + 30);
        var tMin = tMax > 200 ? tMax - 200 : 0;
        var rhoHistMax = 5;

        function toXt(t) { return padL + ((t - tMin) / (tMax - tMin)) * chartW; }
        function toYecho(v) { return echoPadT + echoChartH - (Math.min(v, rhoHistMax) / rhoHistMax) * echoChartH; }

        // Axis
        ctx.strokeStyle = 'rgba(200,200,220,0.15)';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(padL, echoPadT); ctx.lineTo(padL, echoPadT + echoChartH); ctx.lineTo(padL + chartW, echoPadT + echoChartH); ctx.stroke();

        // Labels
        ctx.fillStyle = 'rgba(200,200,220,0.3)';
        ctx.font = '10px JetBrains Mono';
        ctx.textAlign = 'center';
        ctx.fillText('CORE DENSITY ρ(0, t) — ECHO RINGING', W / 2, echoPadT - 6);

        ctx.textAlign = 'center';
        var tickInterval = tMax <= 60 ? 10 : tMax <= 150 ? 25 : 50;
        for (var tt = Math.ceil(tMin / tickInterval) * tickInterval; tt <= tMax; tt += tickInterval) {
            ctx.fillText(tt.toFixed(0), toXt(tt), echoPadT + echoChartH + 16);
        }

        // Echo history (only draw visible range)
        if (coreDensityHistory.length > 1) {
            ctx.beginPath();
            var started = false;
            for (var i = 0; i < coreDensityHistory.length; i++) {
                if (coreDensityHistory[i].t < tMin) continue;
                if (coreDensityHistory[i].t > tMax) break;
                var px = toXt(coreDensityHistory[i].t);
                var py = toYecho(coreDensityHistory[i].rho);
                if (!started) { ctx.moveTo(px, py); started = true; } else ctx.lineTo(px, py);
            }
            ctx.strokeStyle = '#e879f9';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.strokeStyle = 'rgba(232,121,249,0.15)';
            ctx.lineWidth = 5;
            ctx.stroke();
        }

        // Echo period markers
        if (echoTimes.length >= 2) {
            ctx.setLineDash([3,3]);
            ctx.strokeStyle = 'rgba(6,255,165,0.4)';
            ctx.lineWidth = 1;
            for (var i = 0; i < echoTimes.length; i++) {
                var ex = toXt(echoTimes[i]);
                ctx.beginPath(); ctx.moveTo(ex, echoPadT); ctx.lineTo(ex, echoPadT + echoChartH); ctx.stroke();
            }
            ctx.setLineDash([]);
        }

        // Compute echo period
        var echoPeriod = 0;
        if (echoTimes.length >= 2) {
            var periods = [];
            for (var i = 1; i < echoTimes.length; i++) {
                periods.push(echoTimes[i] - echoTimes[i-1]);
            }
            echoPeriod = periods.reduce(function(a,b){return a+b}, 0) / periods.length;
        }

        // Update HUD
        document.getElementById('hud').innerHTML =
            '<div class="hud-card"><div class="hud-label">Echo Period</div><div class="hud-value magenta">' + (echoPeriod > 0 ? echoPeriod.toFixed(1) : '—') + '</div><div class="hud-sub">target: 44.7 τ_M</div></div>' +
            '<div class="hud-card"><div class="hud-label">Echo Count</div><div class="hud-value magenta">' + Math.max(0, echoTimes.length - 1) + '</div><div class="hud-sub">pressure bounces</div></div>' +
            '<div class="hud-card"><div class="hud-label">Core ρ(0)</div><div class="hud-value magenta">' + (lisaState.coreDensity || 0).toFixed(3) + '</div><div class="hud-sub">ρ₀ units</div></div>' +
            '<div class="hud-card"><div class="hud-label">Sim Time</div><div class="hud-value magenta">' + (lisaState.time || 0).toFixed(1) + '</div><div class="hud-sub">τ_M units</div></div>';

        ctx.textAlign = 'center';
        ctx.fillStyle = 'rgba(200,200,220,0.3)';
        ctx.font = '10px JetBrains Mono';
        ctx.fillText('t (τ_M units)', W / 2, H - 10);

        lisaRAF = requestAnimationFrame(draw);
    }

    // Initial HUD
    document.getElementById('hud').innerHTML =
        '<div class="hud-card"><div class="hud-label">Status</div><div class="hud-value magenta">INITIALIZING</div><div class="hud-sub">computing Gaussian collapse</div></div>';

    draw();
}


// ═══ BOOT — Cold start sim 1 ═══
initMermin();

// ═══ RESIZE HANDLER (canvas sims) ═══
window.addEventListener('resize', function(){
    // Canvas-based sims auto-resize on next draw()
});

})();
</script>
