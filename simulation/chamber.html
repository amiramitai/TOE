<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Open-Source Vacuum — Simulation Chamber v8.0</title>
<meta name="description" content="Interactive topological simulations of the UHF superfluid vacuum. Mermin-Tesla singularity, trefoil reconnection, LISA acoustic echo.">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --void:#06060e;--panel:#0a0a18;--border:#1a1a3a;--border-hi:#2a2a5a;
  --neon:#06ffa5;--neon-dim:rgba(6,255,165,0.15);--neon-glow:rgba(6,255,165,0.4);
  --cyan:#38bdf8;--cyan-dim:rgba(56,189,248,0.15);
  --magenta:#e879f9;--magenta-dim:rgba(232,121,249,0.15);
  --text:#c8ccd4;--text-dim:#5a5e6a;--text-bright:#f0f2f5;
  --mono:'JetBrains Mono',monospace;--sans:'Inter',system-ui,sans-serif;
}
html,body{height:100%;overflow:hidden;background:var(--void);color:var(--text);font-family:var(--sans)}

/* ═══ LAYOUT ═══ */
.chamber{display:flex;flex-direction:column;height:100vh;width:100vw}
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  height:48px;padding:0 20px;
  background:var(--panel);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:100;
}
.topbar-title{font:500 13px var(--mono);color:var(--text-dim);letter-spacing:0.08em;text-transform:uppercase}
.topbar-title span{color:var(--neon)}
.topbar-back{font:400 12px var(--mono);color:var(--text-dim);text-decoration:none;
  padding:4px 12px;border:1px solid var(--border);border-radius:6px;transition:all .2s}
.topbar-back:hover{color:var(--neon);border-color:var(--neon)}

/* ═══ RADIO BAR ═══ */
.radiobar{
  display:flex;align-items:stretch;height:56px;
  background:var(--panel);border-bottom:1px solid var(--border);
  flex-shrink:0;position:relative;z-index:90;
}
.radio-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:10px;
  background:transparent;border:none;border-bottom:2px solid transparent;
  color:var(--text-dim);font:500 12px var(--mono);letter-spacing:0.04em;
  cursor:pointer;transition:all .25s;position:relative;padding:0 12px;
  text-transform:uppercase;
}
.radio-btn:hover{color:var(--text);background:rgba(255,255,255,0.02)}
.radio-btn.active{color:var(--neon);border-bottom-color:var(--neon);background:var(--neon-dim)}
.radio-btn[data-sim="trefoil"].active{color:var(--cyan);border-bottom-color:var(--cyan);background:var(--cyan-dim)}
.radio-btn[data-sim="lisa"].active{color:var(--magenta);border-bottom-color:var(--magenta);background:var(--magenta-dim)}
.radio-dot{width:8px;height:8px;border-radius:50%;border:1.5px solid currentColor;flex-shrink:0;transition:all .25s}
.radio-btn.active .radio-dot{background:currentColor;box-shadow:0 0 8px currentColor}
.radio-label{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ═══ VIEWPORT ═══ */
.viewport{flex:1;position:relative;overflow:hidden;background:var(--void)}
.viewport canvas,.viewport .sim-container{position:absolute;inset:0;width:100%!important;height:100%!important}

/* ═══ FADE OVERLAY ═══ */
.fade-overlay{
  position:absolute;inset:0;background:var(--void);z-index:50;
  opacity:0;pointer-events:none;transition:opacity .35s ease;
}
.fade-overlay.active{opacity:1;pointer-events:all}

/* ═══ HUD ═══ */
.hud{
  display:flex;gap:10px;padding:10px 20px;
  background:var(--panel);border-top:1px solid var(--border);
  flex-shrink:0;overflow-x:auto;align-items:stretch;
}
.hud-card{
  background:rgba(20,20,40,0.6);
  border:1px solid var(--border);border-radius:8px;padding:10px 14px;
  min-width:160px;flex-shrink:0;
}
.hud-label{font:500 9px var(--mono);color:var(--text-dim);text-transform:uppercase;letter-spacing:0.12em;margin-bottom:4px}
.hud-value{font:600 18px var(--mono);color:var(--neon);line-height:1.2}
.hud-value.cyan{color:var(--cyan)}
.hud-value.magenta{color:var(--magenta)}
.hud-sub{font:400 10px var(--mono);color:var(--text-dim);margin-top:2px}

/* ═══ CONTROLS BAR ═══ */
.controls{
  display:none;align-items:center;gap:16px;padding:0 20px;height:40px;
  background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;
}
.controls.visible{display:flex}
.ctrl-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);
  font:400 11px var(--mono);padding:4px 12px;border-radius:4px;cursor:pointer;transition:all .2s}
.ctrl-btn:hover,.ctrl-btn.active{color:var(--cyan);border-color:var(--cyan)}
.ctrl-label{font:400 10px var(--mono);color:var(--text-dim);white-space:nowrap}
.ctrl-slider{-webkit-appearance:none;appearance:none;height:3px;background:var(--border);
  border-radius:2px;outline:none;flex:1;max-width:250px}
.ctrl-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;
  border-radius:50%;background:var(--cyan);cursor:pointer}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .radio-btn{font-size:10px;gap:6px;padding:0 8px}
  .radio-label{font-size:9px}
  .hud{padding:8px 12px;gap:6px}
  .hud-card{padding:6px 10px;min-width:120px}
  .hud-value{font-size:14px}
  .topbar{padding:0 12px}
}
@media(max-width:480px){
  .radiobar{height:48px}
  .radio-label{display:none}
}

/* ═══ SLIDER VARIANTS ═══ */
.ctrl-slider.neon::-webkit-slider-thumb{background:var(--neon)}
.ctrl-slider.pink::-webkit-slider-thumb{background:#f472b6}
.ctrl-slider.cyan::-webkit-slider-thumb{background:var(--cyan)}
.ctrl-slider.magenta::-webkit-slider-thumb{background:var(--magenta)}
.ctrl-value{font:600 12px var(--mono);color:var(--text-bright);min-width:50px}
.ctrl-sep{width:1px;height:20px;background:var(--border);margin:0 4px;flex-shrink:0}
</style>
</head>
<body>

<div class="chamber">
  <!-- ═══ TOP BAR ═══ -->
  <div class="topbar">
    <div class="topbar-title"><span>UHF</span> Simulation Chamber <span>v8.0</span></div>
    <a href="index.html" class="topbar-back">← Main</a>
  </div>

  <!-- ═══ RADIO BAR ═══ -->
  <div class="radiobar" id="radiobar">
    <button class="radio-btn active" data-sim="mermin" onclick="switchSim('mermin')">
      <span class="radio-dot"></span>
      <span class="radio-label">Hardware-Verified Non-Locality</span>
    </button>
    <button class="radio-btn" data-sim="trefoil" onclick="switchSim('trefoil')">
      <span class="radio-dot"></span>
      <span class="radio-label">The Trefoil Reconnection</span>
    </button>
    <button class="radio-btn" data-sim="lisa" onclick="switchSim('lisa')">
      <span class="radio-dot"></span>
      <span class="radio-label">The LISA Acoustic Echo</span>
    </button>
  </div>

  <!-- ═══ VIEWPORT ═══ -->
  <div class="viewport" id="viewport">
    <div class="fade-overlay" id="fade"></div>

    <!-- Mermin container (2D canvas) -->
    <canvas id="mermin-canvas" class="sim-container" style="display:block"></canvas>

    <!-- Trefoil container (Three.js) -->
    <div id="trefoil-container" class="sim-container" style="display:none"></div>

    <!-- LISA container (2D canvas) -->
    <canvas id="lisa-canvas" class="sim-container" style="display:none"></canvas>
  </div>

  <!-- Controls bar (play/pause, sliders) -->
  <div class="controls" id="controls"></div>

  <!-- HUD (dedicated bottom strip) -->
  <div class="hud" id="hud"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// CHAMBER CONTROLLER — Slider-Driven Simulations
// ═══════════════════════════════════════════════════════════════════
(function(){
'use strict';

var activeSim = 'mermin';
var activeWorker = null;
var threeScene = null, threeRenderer = null, threeCamera = null, threeRAF = null;
var merminRAF = null, lisaRAF = null;

// ═══ MEMORY SANITIZATION ═══
function purge() {
    if (activeWorker) { activeWorker.terminate(); activeWorker = null; }
    if (merminRAF) { cancelAnimationFrame(merminRAF); merminRAF = null; }
    if (lisaRAF) { cancelAnimationFrame(lisaRAF); lisaRAF = null; }
    if (threeRAF) { cancelAnimationFrame(threeRAF); threeRAF = null; }
    if (threeScene) {
        threeScene.traverse(function(obj) {
            if (obj.geometry) obj.geometry.dispose();
            if (obj.material) {
                if (Array.isArray(obj.material)) obj.material.forEach(function(m){m.dispose()});
                else obj.material.dispose();
            }
        });
        threeScene = null;
    }
    if (threeRenderer) {
        threeRenderer.dispose();
        threeRenderer.forceContextLoss();
        var el = threeRenderer.domElement;
        if (el && el.parentNode) el.parentNode.removeChild(el);
        threeRenderer = null;
    }
    threeCamera = null;
    document.getElementById('hud').innerHTML = '';
    document.getElementById('controls').className = 'controls';
    document.getElementById('controls').innerHTML = '';
}

function fadeTransition(cb) {
    var overlay = document.getElementById('fade');
    overlay.classList.add('active');
    setTimeout(function(){ cb(); setTimeout(function(){ overlay.classList.remove('active'); }, 80); }, 350);
}

window.switchSim = function(sim) {
    if (sim === activeSim) return;
    fadeTransition(function(){
        purge();
        document.getElementById('mermin-canvas').style.display = 'none';
        document.getElementById('trefoil-container').style.display = 'none';
        document.getElementById('lisa-canvas').style.display = 'none';
        document.querySelectorAll('.radio-btn').forEach(function(b){
            b.classList.toggle('active', b.dataset.sim === sim);
        });
        activeSim = sim;
        if (sim === 'mermin') initMermin();
        else if (sim === 'trefoil') initTrefoil();
        else if (sim === 'lisa') initLisa();
    });
};

// ═══ Helpers ═══
function sup(n) {
    var s = {'0':'\u2070','1':'\u00B9','2':'\u00B2','3':'\u00B3','4':'\u2074','5':'\u2075','6':'\u2076','7':'\u2077'};
    return String(n).split('').map(function(c){return s[c]||c}).join('');
}

// ═══════════════════════════════════════════════════════════════════
// SIM 1: MERMIN–KLYSHKO  —  N slider (2–8)
// ═══════════════════════════════════════════════════════════════════
function initMermin() {
    var canvas = document.getElementById('mermin-canvas');
    canvas.style.display = 'block';
    var ctx = canvas.getContext('2d');

    // All values computed inline (trivial)
    var results = [];
    for (var N = 2; N <= 8; N++) {
        results.push({ N: N, quantum: Math.pow(2, N - 1), classical: 2, ratio: Math.pow(2, N - 1) / 2 });
    }

    var selectedN = 7;
    var t = 0;

    // ── Controls: N slider ──
    var ctrl = document.getElementById('controls');
    ctrl.className = 'controls visible';
    ctrl.innerHTML =
        '<span class="ctrl-label">N =</span>' +
        '<input type="range" class="ctrl-slider pink" min="2" max="8" step="1" value="7" id="mermin-n-slider">' +
        '<span class="ctrl-value" id="mermin-n-val" style="color:#f472b6">7</span>';
    document.getElementById('mermin-n-slider').oninput = function() {
        selectedN = parseInt(this.value);
        document.getElementById('mermin-n-val').textContent = selectedN;
        var cls = selectedN === 7 ? 'pink' : (selectedN === 3 ? 'cyan' : 'neon');
        var clr = selectedN === 7 ? '#f472b6' : (selectedN === 3 ? 'var(--cyan)' : 'var(--neon)');
        this.className = 'ctrl-slider ' + cls;
        document.getElementById('mermin-n-val').style.color = clr;
        updateHUD();
    };

    function updateHUD() {
        var qMax = Math.pow(2, selectedN - 1);
        var ratio = qMax / 2;
        var hwTag = selectedN === 7 ? '<div class="hud-sub" style="color:#f472b6">14-decimal hardware verified</div>' : (selectedN === 3 ? '<div class="hud-sub" style="color:var(--cyan)">vortex threshold</div>' : '<div class="hud-sub">= 2' + sup(selectedN-1) + '</div>');
        var statusLabel, statusColor, statusSub;
        if (selectedN >= 3) {
            statusLabel = 'TQA VERIFIED';
            statusColor = 'color:var(--neon)';
            statusSub = '2' + sup(selectedN-1) + ' \u226B 2 (classical)';
        } else {
            statusLabel = 'TSIRELSON';
            statusColor = 'color:var(--text-dim)';
            statusSub = 'N=2 boundary case';
        }
        document.getElementById('hud').innerHTML =
            '<div class="hud-card"><div class="hud-label">N=' + selectedN + ' Quantum Max</div><div class="hud-value">' + qMax + '.0</div>' + hwTag + '</div>' +
            '<div class="hud-card"><div class="hud-label">Topological Quantum Advantage</div><div class="hud-value" style="' + statusColor + '">' + statusLabel + '</div><div class="hud-sub">' + statusSub + '</div></div>' +
            '<div class="hud-card"><div class="hud-label">Advantage Ratio</div><div class="hud-value">' + ratio.toFixed(1) + '\u00D7</div><div class="hud-sub">2' + sup(selectedN-1) + ' / 2</div></div>' +
            '<div class="hud-card"><div class="hud-label">Classical Bound</div><div class="hud-value" style="color:var(--text-dim)">2.0</div><div class="hud-sub" style="color:var(--text-dim)">obsolete at N\u22653</div></div>';
    }
    updateHUD();

    function draw() {
        var W = canvas.parentElement.clientWidth;
        var H = canvas.parentElement.clientHeight;
        if (canvas.width !== W * 2 || canvas.height !== H * 2) {
            canvas.width = W * 2; canvas.height = H * 2;
            canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        }
        ctx.setTransform(2, 0, 0, 2, 0, 0);
        ctx.clearRect(0, 0, W, H);
        t += 0.016;

        var padL = 100, padR = 60, padT = 80, padB = 80;
        var chartW = W - padL - padR;
        var chartH = H - padT - padB;
        var yMax = 160;

        function toX(N) { return padL + ((N - 2) / 6) * chartW; }
        function toY(v) { return padT + chartH - (v / yMax) * chartH; }

        // Grid
        ctx.strokeStyle = 'rgba(26,26,58,0.4)'; ctx.lineWidth = 0.5;
        for (var x = 80; x < W; x += 80) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
        for (var y = 60; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

        // Axes
        ctx.strokeStyle = 'rgba(200,200,220,0.15)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(padL, padT); ctx.lineTo(padL, padT + chartH); ctx.lineTo(padL + chartW, padT + chartH); ctx.stroke();

        // X labels with singularity anchors
        ctx.font = '11px JetBrains Mono'; ctx.textAlign = 'center';
        for (var n = 2; n <= 8; n++) {
            var isN7 = n === 7;
            var isN3 = n === 3;
            ctx.fillStyle = n === selectedN ? (isN7 ? '#f472b6' : '#06ffa5') : (isN7 ? 'rgba(244,114,182,0.4)' : (isN3 ? 'rgba(56,189,248,0.5)' : 'rgba(200,200,220,0.5)'));
            ctx.font = (isN7 || isN3) ? 'bold 11px JetBrains Mono' : '11px JetBrains Mono';
            ctx.fillText('N=' + n, toX(n), padT + chartH + 20);
            // Singularity anchor labels
            if (isN3) {
                ctx.fillStyle = n === selectedN ? '#38bdf8' : 'rgba(56,189,248,0.45)';
                ctx.font = '8px JetBrains Mono';
                ctx.fillText('VORTEX THRESHOLD', toX(n), padT + chartH + 33);
            }
            if (isN7) {
                ctx.fillStyle = n === selectedN ? '#f472b6' : 'rgba(244,114,182,0.4)';
                ctx.font = '8px JetBrains Mono';
                ctx.fillText('MERMIN NUKE', toX(n), padT + chartH + 33);
            }
        }

        // Y labels
        ctx.textAlign = 'right';
        for (var v = 0; v <= yMax; v += 32) {
            ctx.fillStyle = 'rgba(200,200,220,0.3)'; ctx.fillText(v.toFixed(0), padL - 10, toY(v) + 4);
            ctx.strokeStyle = 'rgba(200,200,220,0.05)';
            ctx.beginPath(); ctx.moveTo(padL, toY(v)); ctx.lineTo(padL + chartW, toY(v)); ctx.stroke();
        }

        // Classical bound (dim grey — obsolete)
        ctx.strokeStyle = 'rgba(90,94,106,0.35)'; ctx.lineWidth = 1; ctx.setLineDash([6,4]);
        ctx.beginPath(); ctx.moveTo(padL, toY(2)); ctx.lineTo(padL + chartW, toY(2)); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(90,94,106,0.5)'; ctx.textAlign = 'left'; ctx.font = '10px JetBrains Mono';
        ctx.fillText('CLASSICAL BOUND = 2 (obsolete)', padL + 8, toY(2) - 6);

        // Exponential curve
        ctx.strokeStyle = 'rgba(6,255,165,0.5)'; ctx.lineWidth = 2; ctx.beginPath();
        for (var i = 0; i <= 120; i++) {
            var N_ = 2 + (i / 120) * 6;
            var val = Math.pow(2, N_ - 1);
            var px = toX(N_), py = toY(val);
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.stroke();
        ctx.strokeStyle = 'rgba(6,255,165,0.12)'; ctx.lineWidth = 8; ctx.stroke();

        // Data points — non-selected first, then selected on top
        var dotColors = ['#5a5e6a','#6b6e7a','#7a7e8a','#8a8e9a','#9a9eaa','#aab0ba','#bbc0ca'];
        for (var j = 0; j < results.length; j++) {
            var r = results[j];
            if (r.N === selectedN) continue;
            var px = toX(r.N), py = toY(r.quantum);
            var isN7 = r.N === 7, isN3 = r.N === 3;
            var dc = isN7 ? '#f472b6' : (isN3 ? '#38bdf8' : dotColors[j]);
            ctx.beginPath(); ctx.arc(px, py, (isN7 || isN3) ? 5 : 4, 0, Math.PI * 2);
            ctx.fillStyle = isN7 ? 'rgba(244,114,182,0.7)' : (isN3 ? 'rgba(56,189,248,0.7)' : dc); ctx.fill();
            ctx.strokeStyle = isN7 ? 'rgba(244,114,182,0.3)' : (isN3 ? 'rgba(56,189,248,0.3)' : 'rgba(255,255,255,0.15)'); ctx.lineWidth = 1; ctx.stroke();
            ctx.textAlign = 'center'; ctx.fillStyle = dc; ctx.font = (isN7 || isN3) ? 'bold 10px JetBrains Mono' : '10px JetBrains Mono';
            ctx.fillText(r.quantum.toFixed(0), px, py - 10);
        }
        // Selected point with callout badge above
        for (var j = 0; j < results.length; j++) {
            var r = results[j];
            if (r.N !== selectedN) continue;
            var px = toX(r.N), py = toY(r.quantum);

            var isHW = selectedN === 7;
            var isVT = selectedN === 3;
            var accentColor = isHW ? '#f472b6' : (isVT ? '#38bdf8' : '#06ffa5');
            var accentDim = isHW ? 'rgba(244,114,182,0.12)' : (isVT ? 'rgba(56,189,248,0.12)' : 'rgba(6,255,165,0.12)');
            var accentMid = isHW ? 'rgba(244,114,182,0.3)' : (isVT ? 'rgba(56,189,248,0.3)' : 'rgba(6,255,165,0.3)');
            var accentBorder = isHW ? 'rgba(244,114,182,0.5)' : (isVT ? 'rgba(56,189,248,0.5)' : 'rgba(6,255,165,0.5)');
            var accentSoft = isHW ? 'rgba(244,114,182,0.7)' : (isVT ? 'rgba(56,189,248,0.7)' : 'rgba(6,255,165,0.7)');

            // Pulsing halo
            ctx.beginPath(); ctx.arc(px, py, 22 + Math.sin(t * 3) * 3, 0, Math.PI * 2);
            ctx.fillStyle = accentDim; ctx.fill();

            // Dot
            ctx.beginPath(); ctx.arc(px, py, 7, 0, Math.PI * 2);
            ctx.fillStyle = accentColor; ctx.fill();
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

            // Callout badge — always 60px above the point
            var badgeY = py - 60;
            if (badgeY < padT + 10) badgeY = py + 40; // flip below if too close to top

            // Connector line from dot to badge
            ctx.strokeStyle = accentMid; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(px, py - 9); ctx.lineTo(px, badgeY + 12); ctx.stroke();

            // Badge background pill
            var line1 = r.quantum.toFixed(1);
            var line2;
            if (selectedN >= 3) {
                line2 = 'TQA VERIFIED \u2014 ' + r.ratio.toFixed(1) + '\u00D7';
                if (selectedN === 7) line2 = '14-DEC HW \u2713 TQA \u2014 ' + r.ratio.toFixed(1) + '\u00D7';
                if (selectedN === 3) line2 = 'VORTEX THRESHOLD \u2014 ' + r.ratio.toFixed(1) + '\u00D7';
            } else {
                line2 = 'TSIRELSON BOUND \u2014 ' + r.ratio.toFixed(1) + '\u00D7';
            }
            ctx.font = 'bold 14px JetBrains Mono';
            var tw1 = ctx.measureText(line1).width;
            ctx.font = '9px JetBrains Mono';
            var tw2 = ctx.measureText(line2).width;
            var bw = Math.max(tw1, tw2) + 20;
            var bh = 36;

            ctx.fillStyle = 'rgba(10,10,24,0.92)';
            ctx.strokeStyle = accentBorder;
            ctx.lineWidth = 1;
            var bx = px - bw / 2, by = badgeY - bh / 2;
            ctx.beginPath();
            if (ctx.roundRect) { ctx.roundRect(bx, by, bw, bh, 6); }
            else { ctx.moveTo(bx+6,by); ctx.lineTo(bx+bw-6,by); ctx.arcTo(bx+bw,by,bx+bw,by+6,6); ctx.lineTo(bx+bw,by+bh-6); ctx.arcTo(bx+bw,by+bh,bx+bw-6,by+bh,6); ctx.lineTo(bx+6,by+bh); ctx.arcTo(bx,by+bh,bx,by+bh-6,6); ctx.lineTo(bx,by+6); ctx.arcTo(bx,by,bx+6,by,6); ctx.closePath(); }
            ctx.fill(); ctx.stroke();

            // Badge text
            ctx.textAlign = 'center';
            ctx.fillStyle = accentColor; ctx.font = 'bold 14px JetBrains Mono';
            ctx.fillText(line1, px, badgeY - 2);
            ctx.fillStyle = accentSoft; ctx.font = '9px JetBrains Mono';
            ctx.fillText(line2, px, badgeY + 12);
        }

        // Title
        ctx.fillStyle = '#06ffa5'; ctx.font = 'bold 16px JetBrains Mono'; ctx.textAlign = 'center';
        ctx.fillText('HARDWARE-VERIFIED NON-LOCALITY: |\u27E8M_N\u27E9| = 2^{N\u22121}', W / 2, 35);
        ctx.fillStyle = 'rgba(200,200,220,0.4)'; ctx.font = '11px JetBrains Mono';
        ctx.fillText('Each vortex loop doubles the operator: |M_N| = 2 \u00D7 |M_{N\u22121}|', W / 2, 55);

        // Axis titles
        ctx.fillStyle = 'rgba(200,200,220,0.4)'; ctx.font = '11px JetBrains Mono'; ctx.textAlign = 'center';
        ctx.fillText('N (number of entangled vortex loops)', W / 2, padT + chartH + 45);
        ctx.save(); ctx.translate(20, H / 2); ctx.rotate(-Math.PI / 2);
        ctx.fillText('|\u27E8M_N\u27E9| (quantum maximum)', 0, 0); ctx.restore();

        merminRAF = requestAnimationFrame(draw);
    }
    draw();
}


// ═══════════════════════════════════════════════════════════════════
// SIM 2: TREFOIL RECONNECTION  —  Dissipation slider
// ═══════════════════════════════════════════════════════════════════
function initTrefoil() {
    var container = document.getElementById('trefoil-container');
    container.style.display = 'block';
    container.innerHTML = '';
    var W = container.clientWidth, H = container.clientHeight;

    threeScene = new THREE.Scene();
    threeCamera = new THREE.PerspectiveCamera(55, W / H, 0.1, 100);
    threeCamera.position.set(0, 3, 8);
    threeCamera.lookAt(0, 0, 0);

    threeRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    threeRenderer.setSize(W, H);
    threeRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    threeRenderer.setClearColor(0x06060e, 1);
    container.appendChild(threeRenderer.domElement);

    threeScene.add(new THREE.AmbientLight(0x1a1a4e, 0.4));
    var pl1 = new THREE.PointLight(0x38bdf8, 2, 20); pl1.position.set(3, 5, 3); threeScene.add(pl1);
    var pl2 = new THREE.PointLight(0x06ffa5, 1, 15); pl2.position.set(-3, -2, -3); threeScene.add(pl2);
    var grid = new THREE.GridHelper(20, 40, 0x1a1a3a, 0x0d0d24); grid.position.y = -3; threeScene.add(grid);

    var decay = 1.0;
    var tube = null;
    var time = 0;
    var camSpeed = 0.15;
    var conservation = 0;

    function generateTrefoil(d) {
        var N = 150, pts = [];
        for (var i = 0; i < N; i++) {
            var t = (i / N) * 2 * Math.PI;
            var x = (Math.sin(t) + 2 * Math.sin(2 * t)) * d;
            var y = (Math.cos(t) - 2 * Math.cos(2 * t)) * d;
            var z = (-Math.sin(3 * t)) * d;
            if (d < 1) {
                var dd = 1 - d;
                x += dd * 1.5 * Math.sin(7*t + dd*5) * (0.5 + 0.5*Math.cos(3*t));
                y += dd * 1.5 * Math.cos(5*t + dd*3) * (0.5 + 0.5*Math.sin(4*t));
                z += dd * 2.0 * Math.sin(9*t + dd*7) * Math.cos(2*t);
                if (dd > 0.4) {
                    x += dd*dd * Math.sin(23*t) * 0.8;
                    y += dd*dd * Math.cos(19*t) * 0.8;
                    z += dd*dd * Math.sin(17*t) * 0.8;
                }
            }
            pts.push(new THREE.Vector3(x, y, z));
        }
        return pts;
    }

    function computeH(pts) {
        var N = pts.length, H = 0, H0 = 0;
        for (var i = 0; i < N; i++) {
            var p = pts[i], pn = pts[(i+1) % N];
            H += p.distanceToSquared(pn);
            var t0 = (i / N) * 2 * Math.PI, t1 = ((i+1) / N) * 2 * Math.PI;
            var x0 = Math.sin(t0)+2*Math.sin(2*t0), x1 = Math.sin(t1)+2*Math.sin(2*t1);
            var y0 = Math.cos(t0)-2*Math.cos(2*t0), y1 = Math.cos(t1)-2*Math.cos(2*t1);
            var z0 = -Math.sin(3*t0), z1 = -Math.sin(3*t1);
            H0 += (x1-x0)*(x1-x0)+(y1-y0)*(y1-y0)+(z1-z0)*(z1-z0);
        }
        return ((H - H0) / H0) * 100;
    }

    function buildTube(pts, d) {
        if (tube) { tube.geometry.dispose(); tube.material.dispose(); threeScene.remove(tube); }
        var curve = new THREE.CatmullRomCurve3(pts, true);
        var radius = 0.08 * d + 0.02;
        var geo = new THREE.TubeGeometry(curve, Math.min(pts.length, 200), radius, 8, true);
        var mat = new THREE.MeshPhongMaterial({
            color: 0x38bdf8, emissive: 0x0a1a3a, transparent: true,
            opacity: 0.3 + 0.6 * d, shininess: 80
        });
        tube = new THREE.Mesh(geo, mat);
        threeScene.add(tube);
    }

    // Initial build
    var pts = generateTrefoil(1.0);
    buildTube(pts, 1.0);
    conservation = computeH(pts);

    // ── Controls: dissipation + camera speed ──
    var ctrl = document.getElementById('controls');
    ctrl.className = 'controls visible';
    ctrl.innerHTML =
        '<span class="ctrl-label">DISSIPATION</span>' +
        '<input type="range" class="ctrl-slider" min="0" max="100" step="1" value="0" id="trefoil-decay">' +
        '<span class="ctrl-value" id="trefoil-decay-val" style="color:var(--cyan)">0%</span>' +
        '<span class="ctrl-sep"></span>' +
        '<span class="ctrl-label">CAMERA</span>' +
        '<input type="range" class="ctrl-slider" min="0" max="100" step="1" value="30" id="trefoil-cam">';
    document.getElementById('trefoil-decay').oninput = function() {
        var pct = parseInt(this.value);
        decay = 1.0 - pct / 100;
        document.getElementById('trefoil-decay-val').textContent = pct + '%';
        pts = generateTrefoil(decay);
        buildTube(pts, decay);
        conservation = computeH(pts);
        updateHUD();
    };
    document.getElementById('trefoil-cam').oninput = function() { camSpeed = parseInt(this.value) / 200; };

    function updateHUD() {
        var topo = decay > 0.5 ? 'TREFOIL 3\u2081' : decay > 0.1 ? 'DISSOLVING' : 'PHONON GAS';
        document.getElementById('hud').innerHTML =
            '<div class="hud-card"><div class="hud-label">Hamiltonian \u0394H/H\u2080</div><div class="hud-value cyan">' + conservation.toFixed(2) + '%</div><div class="hud-sub">energy deviation</div></div>' +
            '<div class="hud-card"><div class="hud-label">Decay Factor</div><div class="hud-value cyan">' + decay.toFixed(2) + '</div><div class="hud-sub">1.00 = intact</div></div>' +
            '<div class="hud-card"><div class="hud-label">Topology</div><div class="hud-value cyan">' + topo + '</div><div class="hud-sub">non-axiomatic Beltrami</div></div>' +
            '<div class="hud-card"><div class="hud-label">Dissipation</div><div class="hud-value cyan">' + ((1-decay)*100).toFixed(0) + '%</div><div class="hud-sub">knot \u2192 phonon</div></div>';
    }
    updateHUD();

    function animate() {
        time += 0.016;
        threeCamera.position.x = 8 * Math.cos(time * camSpeed);
        threeCamera.position.z = 8 * Math.sin(time * camSpeed);
        threeCamera.position.y = 3 + Math.sin(time * camSpeed * 0.7);
        threeCamera.lookAt(0, 0, 0);
        threeRenderer.render(threeScene, threeCamera);
        threeRAF = requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('resize', function(){
        if (activeSim !== 'trefoil' || !threeRenderer) return;
        var w = container.clientWidth, h = container.clientHeight;
        threeCamera.aspect = w / h;
        threeCamera.updateProjectionMatrix();
        threeRenderer.setSize(w, h);
    });
}


// ═══════════════════════════════════════════════════════════════════
// SIM 3: LISA ACOUSTIC ECHO  —  Time slider + play/pause
// ═══════════════════════════════════════════════════════════════════
function initLisa() {
    var canvas = document.getElementById('lisa-canvas');
    canvas.style.display = 'block';
    var ctx = canvas.getContext('2d');

    activeWorker = new Worker('workers/worker-lisa.js');

    var frames = null;
    var currentFrame = 0;
    var playing = false;
    var playSpeed = 1;
    var totalTime = 0;
    var rMax = 20;
    var echoTimes = [];
    var peakThreshold = 1.5;

    // Loading state
    document.getElementById('hud').innerHTML =
        '<div class="hud-card"><div class="hud-label">Status</div><div class="hud-value magenta">COMPUTING\u2026</div><div class="hud-sub">pre-computing echo sequence</div></div>';

    activeWorker.postMessage({ type: 'precompute', resolution: 200, frames: 400, stepsPerFrame: 8 });

    activeWorker.onmessage = function(e) {
        if (e.data.type === 'precomputed') {
            frames = e.data.frames;
            totalTime = e.data.totalTime;
            rMax = e.data.rMax;

            // Detect echo peaks
            var lastPeak = false;
            for (var i = 0; i < frames.length; i++) {
                var isPeak = frames[i].coreDensity > peakThreshold;
                if (isPeak && !lastPeak) echoTimes.push(frames[i].time);
                lastPeak = isPeak;
            }

            setupControls();
            updateHUD();
        }
    };

    function setupControls() {
        var ctrl = document.getElementById('controls');
        ctrl.className = 'controls visible';
        ctrl.innerHTML =
            '<button class="ctrl-btn" id="lisa-play">\u25B6 PLAY</button>' +
            '<span class="ctrl-label">TIME</span>' +
            '<input type="range" class="ctrl-slider magenta" min="0" max="' + (frames.length - 1) + '" step="1" value="0" id="lisa-time">' +
            '<span class="ctrl-value" id="lisa-time-val" style="color:var(--magenta)">0.0 \u03C4</span>' +
            '<span class="ctrl-sep"></span>' +
            '<button class="ctrl-btn" id="lisa-speed">1\u00D7</button>';
        document.getElementById('lisa-play').onclick = function() {
            if (playing) {
                playing = false;
                this.textContent = '\u25B6 PLAY';
                this.classList.remove('active');
            } else {
                currentFrame = 0;
                syncDisplay();
                playing = true;
                this.textContent = '\u275A\u275A PAUSE';
                this.classList.add('active');
            }
        };
        document.getElementById('lisa-time').oninput = function() {
            currentFrame = parseInt(this.value);
            playing = false;
            document.getElementById('lisa-play').textContent = '\u25B6 PLAY';
            document.getElementById('lisa-play').classList.remove('active');
            syncDisplay();
            updateHUD();
        };
        document.getElementById('lisa-speed').onclick = function() {
            playSpeed = playSpeed === 1 ? 2 : playSpeed === 2 ? 4 : 1;
            this.textContent = playSpeed + '\u00D7';
        };
    }

    function syncDisplay() {
        if (!frames) return;
        document.getElementById('lisa-time-val').textContent = frames[currentFrame].time.toFixed(1) + ' \u03C4';
        document.getElementById('lisa-time').value = currentFrame;
    }

    function updateHUD() {
        if (!frames) return;
        var f = frames[currentFrame];
        var echoCount = 0;
        for (var i = 0; i < echoTimes.length; i++) { if (echoTimes[i] <= f.time) echoCount++; }
        var echoPeriod = 0;
        if (echoTimes.length >= 2) {
            var p = [];
            for (var i = 1; i < echoTimes.length; i++) p.push(echoTimes[i] - echoTimes[i-1]);
            echoPeriod = p.reduce(function(a,b){return a+b},0) / p.length;
        }
        document.getElementById('hud').innerHTML =
            '<div class="hud-card"><div class="hud-label">Echo Period</div><div class="hud-value magenta">' + (echoPeriod > 0 ? echoPeriod.toFixed(1) : '\u2014') + '</div><div class="hud-sub">target: 44.7 \u03C4</div></div>' +
            '<div class="hud-card"><div class="hud-label">Echoes Observed</div><div class="hud-value magenta">' + Math.max(0, echoCount - 1) + '</div><div class="hud-sub">pressure bounces</div></div>' +
            '<div class="hud-card"><div class="hud-label">Core \u03C1(0)</div><div class="hud-value magenta">' + f.coreDensity.toFixed(3) + '</div><div class="hud-sub">\u03C1\u2080 units</div></div>' +
            '<div class="hud-card"><div class="hud-label">Sim Time</div><div class="hud-value magenta">' + f.time.toFixed(1) + '</div><div class="hud-sub">\u03C4_M units</div></div>';
    }

    function draw() {
        if (!frames) { lisaRAF = requestAnimationFrame(draw); return; }

        // Auto-advance if playing
        if (playing) {
            currentFrame = Math.min(currentFrame + playSpeed, frames.length - 1);
            if (currentFrame >= frames.length - 1) {
                playing = false;
                var pb = document.getElementById('lisa-play');
                if (pb) { pb.textContent = '\u25B6 PLAY'; pb.classList.remove('active'); }
            }
            syncDisplay();
            if (currentFrame % 4 === 0) updateHUD();
        }

        var f = frames[currentFrame];
        var W = canvas.parentElement.clientWidth;
        var H = canvas.parentElement.clientHeight;
        if (canvas.width !== W * 2 || canvas.height !== H * 2) {
            canvas.width = W * 2; canvas.height = H * 2;
            canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
        }
        ctx.setTransform(2, 0, 0, 2, 0, 0);
        ctx.clearRect(0, 0, W, H);

        // Grid
        ctx.strokeStyle = 'rgba(26,26,58,0.4)'; ctx.lineWidth = 0.5;
        for (var x = 80; x < W; x += 80) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
        for (var y = 60; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

        // ── TOP: density profile ──
        var splitY = H * 0.55;
        var padL = 80, padR = 40, padT = 50, padB = 30;
        var chartW = W - padL - padR;
        var chartH = splitY - padT - padB;
        var rhoMax = 5;
        var dr = rMax / f.rho.length;

        function toX(r) { return padL + (r / rMax) * chartW; }
        function toYrho(v) { return padT + chartH - (Math.min(v, rhoMax) / rhoMax) * chartH; }

        ctx.strokeStyle = 'rgba(200,200,220,0.15)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(padL, padT); ctx.lineTo(padL, padT + chartH); ctx.lineTo(padL + chartW, padT + chartH); ctx.stroke();

        // Labels
        ctx.fillStyle = 'rgba(200,200,220,0.4)'; ctx.font = '10px JetBrains Mono'; ctx.textAlign = 'right';
        for (var v = 0; v <= rhoMax; v++) ctx.fillText(v.toFixed(0), padL - 8, toYrho(v) + 4);
        ctx.textAlign = 'center';
        for (var r = 0; r <= rMax; r += 5) ctx.fillText(r.toFixed(0), toX(r), padT + chartH + 16);

        // Density fill
        ctx.beginPath(); ctx.moveTo(toX(0), toYrho(0));
        for (var i = 0; i < f.rho.length; i++) ctx.lineTo(toX((i+0.5)*dr), toYrho(f.rho[i]));
        ctx.lineTo(toX(rMax), toYrho(0)); ctx.closePath();
        var grad = ctx.createLinearGradient(0, padT, 0, padT + chartH);
        grad.addColorStop(0, 'rgba(232,121,249,0.3)'); grad.addColorStop(1, 'rgba(232,121,249,0.02)');
        ctx.fillStyle = grad; ctx.fill();

        // Density line
        ctx.beginPath();
        for (var i = 0; i < f.rho.length; i++) {
            var px = toX((i+0.5)*dr), py = toYrho(f.rho[i]);
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.strokeStyle = '#e879f9'; ctx.lineWidth = 2; ctx.stroke();
        ctx.strokeStyle = 'rgba(232,121,249,0.2)'; ctx.lineWidth = 6; ctx.stroke();

        // Title
        ctx.fillStyle = '#e879f9'; ctx.font = 'bold 14px JetBrains Mono'; ctx.textAlign = 'center';
        ctx.fillText('GRAVASTAR DENSITY PROFILE \u2014 \u03C1(r, t)', W / 2, 28);
        ctx.fillStyle = 'rgba(200,200,220,0.3)'; ctx.font = '10px JetBrains Mono';
        ctx.fillText('t = ' + f.time.toFixed(1) + ' \u03C4_M', W / 2, 42);

        // ── BOTTOM: echo timeline ──
        var echoPadT = splitY + 20, echoPadB = 40;
        var echoChartH = H - echoPadT - echoPadB;
        var rhoHistMax = 5;

        function toXt(t) { return padL + (t / totalTime) * chartW; }
        function toYecho(v) { return echoPadT + echoChartH - (Math.min(v, rhoHistMax) / rhoHistMax) * echoChartH; }

        ctx.strokeStyle = 'rgba(200,200,220,0.15)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(padL, echoPadT); ctx.lineTo(padL, echoPadT + echoChartH); ctx.lineTo(padL + chartW, echoPadT + echoChartH); ctx.stroke();

        ctx.fillStyle = 'rgba(200,200,220,0.3)'; ctx.font = '10px JetBrains Mono'; ctx.textAlign = 'center';
        ctx.fillText('CORE DENSITY \u03C1(0, t) \u2014 ECHO RINGING', W / 2, echoPadT - 6);
        var tickInt = totalTime <= 60 ? 10 : totalTime <= 150 ? 25 : 50;
        for (var tt = 0; tt <= totalTime; tt += tickInt) ctx.fillText(tt.toFixed(0), toXt(tt), echoPadT + echoChartH + 16);

        // Full history (dimmed)
        ctx.beginPath();
        for (var i = 0; i < frames.length; i++) {
            var px = toXt(frames[i].time), py = toYecho(frames[i].coreDensity);
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.strokeStyle = 'rgba(232,121,249,0.1)'; ctx.lineWidth = 1; ctx.stroke();

        // History up to cursor (bright)
        ctx.beginPath();
        for (var i = 0; i <= currentFrame; i++) {
            var px = toXt(frames[i].time), py = toYecho(frames[i].coreDensity);
            if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
        }
        ctx.strokeStyle = '#e879f9'; ctx.lineWidth = 1.5; ctx.stroke();
        ctx.strokeStyle = 'rgba(232,121,249,0.12)'; ctx.lineWidth = 5; ctx.stroke();

        // Playhead cursor
        var cursorX = toXt(f.time);
        ctx.strokeStyle = 'rgba(232,121,249,0.8)'; ctx.lineWidth = 1.5;
        ctx.beginPath(); ctx.moveTo(cursorX, echoPadT); ctx.lineTo(cursorX, echoPadT + echoChartH); ctx.stroke();

        // Echo markers
        ctx.setLineDash([3,3]); ctx.strokeStyle = 'rgba(6,255,165,0.3)'; ctx.lineWidth = 1;
        for (var i = 0; i < echoTimes.length; i++) {
            var ex = toXt(echoTimes[i]);
            ctx.beginPath(); ctx.moveTo(ex, echoPadT); ctx.lineTo(ex, echoPadT + echoChartH); ctx.stroke();
        }
        ctx.setLineDash([]);

        // X axis label
        ctx.fillStyle = 'rgba(200,200,220,0.3)'; ctx.font = '10px JetBrains Mono'; ctx.textAlign = 'center';
        ctx.fillText('t (\u03C4_M units)', W / 2, H - 10);

        lisaRAF = requestAnimationFrame(draw);
    }
    draw();
}


// ═══ BOOT ═══
initMermin();

})();
